<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR ROOM — Utopia Wave Planner</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg:#000000; --bg2:#0a0c11; --bg3:#0f1219; --surface:#13161d; --surface2:#181c25;
  --line:#262b36; --line2:#343b49;
  --gold:#6f8cff; --gold2:#a3b6ff; --golddim:#2b3a6b;
  --amber:#e0a52e;
  --teal:#2dd4bf; --teal2:#5eead4;
  --blue:#b89bff;
  --green:#34d399; --green2:#6ee7b7; --greenbg:#0c2a1f; --greenline:#1f7a57;
  --red:#f6604f; --red2:#ff8a7c; --redbg:#2c1310; --redline:#7a2e26;
  --txt:#e6e9f0; --txt2:#99a2b4; --txt3:#69728a; --head:#ffffff;
  --r:14px; --r2:10px;
  --sh:0 1px 2px rgba(0,0,0,.5), 0 8px 24px -10px rgba(0,0,0,.7);
  --sh2:0 2px 8px rgba(0,0,0,.6), 0 18px 44px -16px rgba(0,0,0,.8);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(900px 420px at 88% -8%, rgba(111,140,255,.13), transparent 60%),
    radial-gradient(720px 420px at -6% 104%, rgba(246,96,79,.08), transparent 58%),
    var(--bg);
  background-attachment:fixed;
  color:var(--txt);
  font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif;
  font-size:14.5px; line-height:1.5; min-height:100vh; -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2b3240;border-radius:6px;border:3px solid transparent;background-clip:content-box}
::-webkit-scrollbar-thumb:hover{background:#3a4456;background-clip:content-box}

.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:600}
.cz{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800}

#app{display:flex;min-height:100vh;position:relative}

/* ── SIDEBAR ── */
#side{width:236px;min-width:236px;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;z-index:50;
  background:var(--surface);border-right:1px solid var(--line)}
.brand{padding:20px 18px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line)}
.brand .crest{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;color:#fff;
  background:linear-gradient(145deg,#4a66c4,#2f47a0);box-shadow:0 6px 16px -6px rgba(58,86,176,.6)}
.brand .wm h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:800;color:var(--head);letter-spacing:-.02em;line-height:1}
.brand .wm p{font-size:11px;color:var(--txt3);font-weight:600;margin-top:4px;display:flex;align-items:center;gap:6px}
.brand .wm p::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.18);animation:pulse 1.6s infinite}

.kd-switch{padding:15px 16px 12px;border-bottom:1px solid var(--line)}
.lbl{font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--txt3);margin-bottom:7px;display:block}
select,input[type=text],input[type=number],input[type=datetime-local]{
  width:100%;background:var(--surface);border:1px solid var(--line2);color:var(--txt);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:13.5px;font-weight:500;padding:9px 11px;border-radius:9px;outline:none;transition:.15s}
select:hover,input:hover{border-color:#aab6cb}
select:focus,input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(58,86,176,.14)}
select{cursor:pointer}

.nav{padding:12px 12px;flex:1}
.navttl{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--txt3);padding:14px 10px 7px}
.nav button{position:relative;display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;
  color:var(--txt2);font-family:'Plus Jakarta Sans',sans-serif;font-size:14.5px;font-weight:600;padding:10px 12px;border-radius:10px;cursor:pointer;transition:.14s}
.nav button:hover{background:var(--bg2);color:var(--txt)}
.nav button.on{background:rgba(58,86,176,.1);color:var(--gold)}
.nav button.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:0 3px 3px 0;background:var(--gold)}
.nav button .i{font-size:15px;width:20px;text-align:center}

.savebar{padding:13px 16px;border-top:1px solid var(--line);font-size:11.5px;font-weight:600;color:var(--txt3);display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
.dot.warn{background:var(--amber)}
.dot.save{background:var(--gold);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.4}}

/* ── MAIN ── */
#main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 26px;
  border-bottom:1px solid var(--line);background:rgba(7,9,13,.8);backdrop-filter:blur(12px)}
.topbar h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;color:var(--head);letter-spacing:-.02em}
.topbar .sub{font-size:12.5px;color:var(--txt3);margin-top:2px;font-weight:500}
.clock{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;color:var(--txt2);text-align:right;line-height:1.7}
.clock b{color:var(--gold)}

.view{padding:24px 26px 80px}
.view.anim>*{animation:rise .4s cubic-bezier(.2,.7,.3,1) backwards}
.view.anim>*:nth-child(2){animation-delay:.05s}.view.anim>*:nth-child(3){animation-delay:.1s}.view.anim>*:nth-child(4){animation-delay:.15s}
@keyframes rise{from{opacity:0;transform:translateY(8px)}}

/* ── PANELS ── */
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.panel-h{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.panel-h h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:15.5px;font-weight:700;color:var(--head);display:flex;gap:8px;align-items:center}
.panel-h .cnt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;color:var(--txt3)}

.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:18px;align-items:start}
@media(max-width:920px){.grid2{grid-template-columns:1fr}}
.planner-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.25fr) minmax(0,.95fr);gap:16px;align-items:start}
.side-col{display:flex;flex-direction:column;gap:16px;min-width:0}
@media(max-width:1200px){.planner-grid{grid-template-columns:minmax(0,1fr) minmax(0,1.3fr)}.side-col{grid-column:1/-1;flex-direction:row}.side-col>*{flex:1;min-width:0}}
@media(max-width:760px){.planner-grid{grid-template-columns:1fr}.side-col{flex-direction:column}}

/* ── BUTTONS ── */
.btn{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:12.5px;border-radius:9px;
  padding:9px 15px;cursor:pointer;border:1px solid var(--line2);background:var(--surface);color:var(--txt);transition:.14s}
.btn:hover{border-color:#aab6cb;background:var(--bg3)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#fff;box-shadow:0 4px 12px -4px rgba(58,86,176,.5)}
.btn.gold:hover{background:var(--gold2);border-color:var(--gold2)}
.btn.ghost{background:var(--surface)}
.btn.red{color:var(--red2)}
.btn.red:hover{border-color:var(--redline);background:var(--redbg)}
.btn.sm{padding:7px 12px;font-size:12px}
.btn.xs{padding:5px 10px;font-size:11px;border-radius:8px}
.btnrow{display:flex;gap:8px;flex-wrap:wrap}

/* ── TABLES (used in My Kingdom view) ── */
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--txt3);
  text-align:right;padding:11px 12px;border-bottom:1px solid var(--line);white-space:nowrap;background:var(--surface2)}
thead th.l{text-align:left}
tbody td{padding:11px 12px;text-align:right;border-bottom:1px solid var(--line);vertical-align:middle}
tbody td.l{text-align:left}
tbody tr:hover{background:var(--bg3)}
tbody tr:last-child td{border-bottom:none}
.num{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--txt)}
.pname{font-weight:700;color:var(--head);font-size:14px}
.prace{font-size:11.5px;color:var(--txt3);font-weight:500}
.def{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--head)}
.dim{color:var(--txt3)}

/* ── CARDS (provinces / targets) ── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;padding:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 14px;transition:.14s;position:relative}
.card:hover{border-color:#b9c3d6;box-shadow:var(--sh)}
.card.brkable{border-left:3px solid var(--green)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.rng{text-align:right;flex-shrink:0}
.rng .num{font-size:12px;color:var(--txt2);display:block;margin-bottom:3px}
.card-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.kpair{display:flex;flex-direction:column;gap:2px}
.kpair .k{font-size:10px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--txt3)}
.kpair .v{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:var(--head)}
.kpair .v.sm{font-size:13px}
.card-ctrls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:11px}
.card-army{margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--txt2);font-weight:500}
.card-actions{display:flex;gap:8px;margin-top:11px}
.card-actions .btn{flex:1}

/* ── NW pill ── */
.pill{display:inline-block;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12.5px;padding:3px 9px;border-radius:999px;min-width:54px;text-align:center}
.pill.in{background:var(--greenbg);color:var(--green2);border:1px solid var(--greenline)}
.pill.out{background:var(--redbg);color:var(--red2);border:1px solid var(--redline)}

/* ── badges ── */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.01em;padding:3px 9px;border-radius:999px;border:1px solid}
.b-home{color:var(--teal2);border-color:#9fded6;background:#e3f7f4}
.b-out{color:var(--red2);border-color:var(--redline);background:var(--redbg)}
.b-war{color:var(--red2);border-color:var(--redline);background:var(--redbg)}
.b-hostile{color:var(--amber);border-color:#e8cd9a;background:#fbf2e0}
.b-eowcf{color:var(--blue);border-color:#d6c6f0;background:#f3edfc}
.b-avail{color:var(--green2);border-color:var(--greenline);background:var(--greenbg)}
.b-done{color:var(--txt3);border-color:var(--line2);background:var(--bg3)}

/* ── toggle ── */
.tg{position:relative;display:inline-flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.tg .sw{width:38px;height:22px;border-radius:999px;background:#2a3140;border:1px solid var(--line2);position:relative;transition:.18s cubic-bezier(.3,.8,.3,1);flex-shrink:0}
.tg .sw::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.18s cubic-bezier(.3,.8,.3,1);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg.on .sw{background:var(--green);border-color:var(--green)}
.tg.on .sw::after{left:18px}
.tg.bl.on .sw{background:var(--red);border-color:var(--red)}
.tg .t{font-size:11px;font-weight:700;color:var(--txt3)}
.tg.on .t{color:var(--txt)}
.tg.disabled{opacity:.35;cursor:not-allowed}

/* ── stepper ── */
.step{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:9px;overflow:hidden;background:var(--surface)}
.step button{background:none;border:none;color:var(--txt2);width:26px;height:28px;cursor:pointer;font-size:15px;line-height:1;transition:.12s}
.step button:hover{background:var(--bg2);color:var(--gold)}
.step .v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;padding:0 9px;min-width:24px;text-align:center;color:var(--txt)}

/* ── leftover ── */
.lo{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.lo.full{color:var(--green2)}.lo.part{color:var(--gold)}.lo.none{color:var(--txt3)}

/* ── assigned chips (in target card) ── */
.asgs{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.asg{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;background:var(--bg3);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
.asg.brk{border-color:var(--greenline);background:var(--greenbg);color:var(--green2)}
.asg.fail{border-color:var(--redline);background:var(--redbg);color:var(--red2)}
.asg .x{color:var(--txt3);cursor:pointer;font-weight:700}
.asg .x:hover{color:var(--red)}
.cat-mass{color:var(--gold)}.cat-chain{color:var(--red2)}.cat-tm{color:var(--blue)}

/* ── wave columns (side by side) ── */
.wave-cols{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;align-items:start}
@media(max-width:1000px){.wave-cols{grid-template-columns:1fr 1fr}}
@media(max-width:680px){.wave-cols{grid-template-columns:1fr}}
.wcol-h{padding:12px 15px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
.wcol-h .t{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
.wcol-h .s{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--txt3)}
.wcol-h.mass{border-top:3px solid var(--gold)}
.wcol-h.chain{border-top:3px solid var(--red)}
.wcol-h.tm{border-top:3px solid var(--blue)}
.wcards{display:flex;flex-direction:column;gap:10px;padding:13px}
.wcard{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:var(--surface2);position:relative}
.wcard.brk{border-left:3px solid var(--green)}
.wcard.fail{border-left:3px solid var(--red)}
.wc-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-weight:700;color:var(--head);font-size:13.5px;padding-right:18px}
.wc-top .arrow{color:var(--gold)}
.wc-line2{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px}
.wc-stats{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:9px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--txt2)}
.wc-stats b{font-weight:700}
.wc-stats .g{color:var(--green2)}.wc-stats .r{color:var(--red2)}
.verdict-ok{color:var(--green2);font-weight:700;font-size:12px}
.verdict-no{color:var(--red2);font-weight:700;font-size:12px}
.wcard .del{position:absolute;top:9px;right:10px;background:none;border:none;color:var(--txt3);font-size:17px;line-height:1;cursor:pointer}
.wcard .del:hover{color:var(--red)}
.wcard .del.mv{right:34px;font-size:13px}
.wcard .del.mv:hover{color:var(--gold)}
.arrow{color:var(--gold);font-weight:700}

/* ── summary tiles ── */
.sumbar{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin-bottom:18px}
.sumcell{background:var(--surface);padding:14px 16px;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh)}
.sumcell .k{font-size:11px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--txt3)}
.sumcell .v{font-family:'JetBrains Mono',monospace;font-size:23px;font-weight:700;color:var(--head);margin-top:5px}
.sumcell .v small{font-size:12px;color:var(--txt3);font-weight:500}

/* ── targets board ── */
.kdrow{display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr 1.1fr auto;gap:12px;align-items:center;padding:15px 18px;border-bottom:1px solid var(--line)}
.kdrow:hover{background:var(--bg3)}
.kdrow .knm{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;color:var(--head)}
.kdrow .kloc{font-size:11.5px;color:var(--txt3);font-weight:500;margin-top:2px}
.kdrow .active-tag{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--gold)}
.cd{font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:600;color:var(--blue)}
.cd.soon{color:var(--amber)}.cd.exp{color:var(--txt3)}

/* ── import ── */
.drop{border:1.5px dashed var(--line2);border-radius:12px;padding:28px;text-align:center;transition:.15s;cursor:pointer;background:var(--bg3)}
.drop:hover,.drop.drag{border-color:var(--gold);background:rgba(58,86,176,.05)}
.drop .ic{font-size:28px;color:var(--gold);margin-bottom:8px}
textarea{width:100%;min-height:140px;background:var(--surface);border:1px solid var(--line2);color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:12px;padding:11px;border-radius:10px;outline:none;resize:vertical;line-height:1.55}
textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(58,86,176,.14)}
.help{font-size:13px;color:var(--txt2);line-height:1.65}
.help code{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg2);padding:2px 6px;border-radius:5px;color:var(--gold2);border:1px solid var(--line)}
.cols{font-family:'JetBrains Mono',monospace;font-size:11.5px;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--teal2);word-break:break-word;line-height:1.8}

/* ── modal ── */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.66);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:42px 18px;overflow-y:auto}
#modal.open{display:flex}
.mbox{background:var(--surface);border:1px solid var(--line);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--sh2);animation:pop .2s cubic-bezier(.2,.8,.3,1)}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}}
.mbox.wide{max-width:680px}
.mh{padding:17px 21px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.mh h3{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:700;color:var(--head)}
.mh .close{background:none;border:none;color:var(--txt3);font-size:24px;cursor:pointer;line-height:1}
.mh .close:hover{color:var(--red)}
.mb{padding:19px 21px}
.mf{padding:15px 21px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.frow.f3{grid-template-columns:1fr 1fr 1fr}
.frow.f1{grid-template-columns:1fr}
.fld label{font-size:11px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;color:var(--txt3);display:block;margin-bottom:5px}

/* ── assign preview ── */
.apv{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:6px}
.apv-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-family:'JetBrains Mono',monospace;font-size:13.5px;font-weight:600}
.apv-row .k{color:var(--txt3);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.01em;font-family:'Plus Jakarta Sans',sans-serif}
.apv-verdict{margin-top:9px;padding:11px;border-radius:9px;text-align:center;font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:800}
.v-break{background:var(--greenbg);color:var(--green2);border:1px solid var(--greenline)}
.v-fail{background:var(--redbg);color:var(--red2);border:1px solid var(--redline)}
.v-na{background:var(--bg2);color:var(--txt2);border:1px solid var(--line)}

.flex{display:flex;gap:10px;align-items:center}
.between{justify-content:space-between}
.mt{margin-top:16px}.mb12{margin-bottom:12px}
.note{font-size:12px;color:var(--txt3);font-weight:500}

<script>
"use strict";
/*══════════════ STATE & PERSISTENCE ══════════════*/
const STORE_KEY="utopia_warroom_v2";
let storageOK=false, STATE=null;

function defaultState(){
  return {
    v:2,
    tick:0,
    settings:{rangeLow:80,rangeHigh:125,ageStart:"2026-04-28T18:00:00Z",defGenerals:4,defGensAtk:1,fanaPct:5,blPct:10,
      genOffBonus:false, refMode:"myavg", lsPerAcre:22, casRate:7.5, newsUrl:"https://utopia-game.com/wol/game/news"},
    myKd:{name:"My Kingdom", loc:"3:4", provinces:[]},
    enemies:{},          // id -> {id,name,loc,status,warStart,eowcfExit,note,wave:[],provinces:[]}
    activeEnemy:null
  };
}
function uid(){return Math.random().toString(36).slice(2,9)}

async function load(){
  // self-hosted storage shim: window.storage -> localStorage
  if(!window.storage){
    window.storage={
      get:async(k)=>{ const v=localStorage.getItem(k); return v==null?null:{value:v}; },
      set:async(k,v)=>{ localStorage.setItem(k,v); return true; },
    };
  }
  // 1) try the server first (shared state for all admins)
  let serverState=null;
  try{
    const su=(window.__WR_SYNC&&window.__WR_SYNC.syncUrl)||location.origin;
    const sk=(window.__WR_SYNC&&window.__WR_SYNC.syncKey)||"";
    const res=await fetch(su.replace(/\/+$/,"")+"/state?key="+encodeURIComponent(sk)+"&_="+Date.now());
    if(res.ok){ const j=await res.json(); if(j&&(j.myKd||j.enemies)) serverState=j; }
  }catch(e){}
  if(serverState){
    STATE=migrate(serverState); storageOK=true;
    dedupEnemiesByLoc();
    try{ await window.storage.set(STORE_KEY, JSON.stringify(STATE)); }catch(e){}
  } else {
    // 2) fall back to local
    try{
      const r=await window.storage.get(STORE_KEY);
      storageOK=true;
      if(r&&r.value){ STATE=migrate(JSON.parse(r.value)); }
      else { STATE=defaultState(); await save(); }
    }catch(err){
      storageOK=false; STATE=defaultState();
    }
  }
  // make sure sync settings are wired from the server-injected globals
  if(window.__WR_SYNC){
    STATE.settings=STATE.settings||{};
    STATE.settings.syncUrl=window.__WR_SYNC.syncUrl||STATE.settings.syncUrl||location.origin;
    STATE.settings.syncKey=window.__WR_SYNC.syncKey||STATE.settings.syncKey||"";
  }
}
function looksLikeOldSample(s){
  // conservative: only treat as sample if it's exactly the old demo shape (6-prov "Knights of the Dawn" vs "The Crimson Covenant")
  try{
    const names=(s.myKd&&s.myKd.provinces||[]).map(p=>p.name).join(",");
    const oldSet="Stormhold,Ironvale,Goldspire,Thornwatch,Emberlyn,Highmarch";
    if(s.myKd && s.myKd.name==="Knights of the Dawn" && s.myKd.provinces.length===6 && names===oldSet) return true;
    // v2 25-prov sample (pre-TM): exact name + 25 provs + original Emberlyn offense
    if(s.myKd && s.myKd.name==="Knights of the Dawn" && s.myKd.provinces.length===25){
      const em=s.myKd.provinces.find(p=>p.name==="Emberlyn"); if(em && num(em.offense)===447475) return true;
    }
    return false;
  }catch(e){ return false; }
}
function scrubProvinces(kd){
  if(!kd||!Array.isArray(kd.provinces)) return;
  const seen={}; const keep=[];
  for(const p of kd.provinces){
    let nm=cleanProvName(p.name||"");
    // reject contaminated/empty names: leftover digits, %, or nothing left
    if(!nm || /[%\d]/.test(nm) || nm.length<2){ continue; }
    p.name=nm;
    const key=nm.toLowerCase();
    if(seen[key]){
      // duplicate: merge into the kept one, preferring non-empty/larger values
      const ex=seen[key];
      const better=(a,b)=>{ const na=Number(a)||0, nb=Number(b)||0; return nb>na?b:a; };
      ex.land=better(ex.land,p.land); ex.nw=better(ex.nw,p.nw); ex.honor=better(ex.honor,p.honor);
      ex.offense=better(ex.offense,p.offense); ex.defense=better(ex.defense,p.defense);
      if(!ex.race&&p.race) ex.race=p.race; if(!ex.pers&&p.pers) ex.pers=p.pers;
      continue;
    }
    seen[key]=p; keep.push(p);
  }
  kd.provinces=keep;
}
function scrubAllProvinces(st){
  if(!st) return;
  if(st.myKd) scrubProvinces(st.myKd);
  if(st.enemies) Object.values(st.enemies).forEach(scrubProvinces);
}
function migrate(s){ const d=defaultState(); s.settings={...d.settings,...(s.settings||{})}; if(!s.enemies)s.enemies={}; if(s.tick==null)s.tick=0;
  Object.values(s.enemies).forEach(e=>{ if(!e.warMode) e.warMode = (e.status==="war"?"in":"out"); if(!e.targets) e.targets=[]; }); scrubAllProvinces(s); return s; }

let saveTimer=null;
function scheduleSave(){ setSaveStatus("save"); clearTimeout(saveTimer); saveTimer=setTimeout(save,400); }

async function pullFromServer(){
  try{ const su=(STATE.settings.syncUrl||"").trim(); const sk=STATE.settings.syncKey||"";
    if(!su) return;
    const r=await fetch(su.replace(/\/+$/,"")+"/state?key="+encodeURIComponent(sk)+"&_="+Date.now());
    const d=await r.json();

function num(x){ if(x==null)return 0; if(typeof x==="number")return x;
  const n=parseFloat(String(x).replace(/[, gc%]/gi,"")); return isNaN(n)?0:n; }

/* fana/BL auto-eligibility + mass toggle for My Kingdom */
function blEligible(p){ return ((p.race||"")+"").toLowerCase()==="orc" || ((p.pers||"")+"").toLowerCase()==="warrior"; }
function allFanaOn(){ const ps=STATE.myKd.provinces||[]; if(!ps.length) return false;
  return ps.every(p=>p.fanaOn && (!blEligible(p) || p.blOn)); }
function toggleMassFana(){

  }); STATE.myKd._rev=Date.now(); });
  toast(turnOn?"⚡ Fanaticism + Bloodlust ON (BL on Orc/Warrior)":"Fanaticism + Bloodlust cleared");
}

/* effective offense of one of my provs given its fana/bl toggles + generals model */function effOffense(p){
  let o=num(p.offense);
  const s=STATE.settings;
  if(p.pers==="Warrior") o*=1.15;                 // Warrior: +15% Offensive ME (Age 115)
  if(p.fanaOn && p.fana) o*=1+s.fanaPct/100;      // Fanaticism +5% OME
  if(p.blOn && p.bl)     o*=1+s.blPct/100;        // Bloodlust +10% OME (Orc)
  return Math.round(o);
}
function activeWave(){ const e=curEnemy(); return e?e.wave:[]; }
function committedOff(provId){ return activeWave().filter(w=>w.attacker===provId && w.cat!=="tm").reduce((a,w)=>a+num(w.off),0); }
function committedGen(provId){ return activeWave().filter(w=>w.attacker===provId && w.cat!=="tm").reduce((a,w)=>a+num(w.gens),0); }
function leftoverOff(p){ return effOffense(p)-committedOff(p.id); }
function leftoverGen(p){ return num(p.generals)-committedGen(p.id); }

function myAvgNW(){ const ps=STATE.myKd.provinces; if(!ps.length)return 0;
  return ps.reduce((a,p)=>a+num(p.nw),0)/ps.length; }
function kdAvgNW(e){ if(!e||!e.provinces.length)return 0;
  return e.provinces.reduce((a,p)=>a+num(p.nw),0)/e.provinces.length; }
function kdLand(e){ return e?e.provinces.reduce((a,p)=>a+num(p.land),0):0; }

/* reference NW for the enemy panel pills */
function refNW(){
  const s=STATE.settings;
  if(s.refMode && s.refMode.startsWith("prov:")){
    const p=STATE.myKd.provinces.find(x=>x.id===s.refMode.slice(5));
    if(p) return num(p.nw);
  }
  return myAvgNW();
}
function inRange(pct){ const s=STATE.settings; return pct>=s.rangeLow && pct<=s.rangeHigh; }

/* gains factor estimate (RPNW × RKNW) per Age 115 wiki */
function rpnwF(t){ if(t<0.567)return 0; if(t<0.9)return 3*t-1.7; if(t<=1.1)return 1; if(t<1.6)return -2*t+3.2; return 0; }
function rknwF(t){ if(t<0.5)return 0.8; if(t<0.9)return t/2+0.55; return 1; }
function estMarchAcres(attacker, target, enemy){
  const aNW=num(attacker.nw)||refNW(), tNW=num(target.nw);
  if(!aNW||!tNW) return null;
  const f=Math.max(0,Math.min(1,rpnwF(tNW/aNW)))*rknwF(kdAvgNW(enemy)/(myAvgNW()||1));
  let ac=num(target.land)*0.12*f;
  const cap=Math.min(num(attacker.land)*0.20, num(target.land)*0.20);
  if(cap>0) ac=Math.min(ac,cap);
  return Math.round(ac);
}

/* ── land / loss / rnw / overpop estimates ── */
const TYPE_LAND={march:0.12, conquest:0.068, raze:0.05}; // fraction of target land
function rpnwRatio(atk,tgt){ const a=(atk&&num(atk.nw))||refNW(); const t=num(tgt.nw); return a? t/a : 0; }
function gainFactor(atk,tgt,enemy){
  const r=rpnwRatio(atk,tgt);
  return Math.max(0,Math.min(1,rpnwF(r)))*rknwF(kdAvgNW(enemy)/(myAvgNW()||1));
}
function estLandGain(atk,tgt,enemy,type){
  if(type==="ambush"){                                   // Ambush: recover 50% of the acres they captured
    let ac=num(tgt.incomingLand)*0.50;                   // their incoming land = acres they took from your KD
    if(atk && atk.pers==="Tactician") ac*=1.25;          // Tactician: +25% land when ambushing
    return Math.round(ac);                               // ignores RPNW/RKNW and the 20% cap
  }
  const base=TYPE_LAND[type]; if(!base || type==="raze") return 0;       // raze destroys, doesn't gain
  let ac=num(tgt.land)*base*gainFactor(atk,tgt,enemy);
  const war = enemy && enemy.warMode==="in";
  if(atk && atk.race==="Orc") ac*= war?1.15:1.05;                       // Orc +15% War / +5% OOW gains
  else if(war) ac*=1.10;                                                // generic War combat-gains
  const cap=Math.min(num(atk?atk.land:0)*0.20, num(tgt.land)*0.20);     // 20% of smaller of acres
  if(cap>0) ac=Math.min(ac,cap);
  return Math.round(ac);
}
function estLandRemoved(atk,tgt,enemy,type){ // acres leaving target's standing land → drives overpop
  if(type==="raze") return Math.round(num(tgt.land)*TYPE_LAND.raze);
  if(type==="ambush") return 0;              // ambush takes their incoming haul, not their standing acres
  return estLandGain(atk,tgt,enemy,type);
}
function estAttackTime(atk,tgt,enemy,type){   // ticks (estimate)
  let t=14;                                   // base: different kingdom
  if(enemy && enemy.warMode==="in") t*=0.85;  // War: −15% (after 12h)
  else {                                      // out of war: NW out-of-range penalty
    const a=(atk&&num(atk.nw))||refNW(), n=num(tgt.nw);
    if(a && n/a*100 < 80) t*=1.20;            // Age 115 attack range starts at 80%
  }
  if(atk && atk.race==="Avian") t*=0.80;      // Avian −20% attack time
  if(atk && atk.race==="Dwarf") t*=1.10;      // Dwarf +10% attack time
  if(atk && atk.pers==="Tactician") t*=0.85;  // Tactician −15% attack time
  return Math.round(t*10)/10;
}
/* derive all live numbers for a wave entry from current intel + war mode */
function deriveAttack(e,x){
  const atk=STATE.myKd.provinces.find(p=>p.id===x.attacker);
  const tgt=e.provinces.find(p=>p.id===x.target);
  if(x.cat==="tm") return {atk,tgt,tm:true};
  const def=num(tgt?tgt.defense:0);
  const genB=1+0.05*Math.max(0,num(x.gens)-1);          // +5% Mod Offense per general over 1
  const modOff=Math.round(num(x.off)*genB);
  const need=x.type==="conquest" ? Math.ceil(def*0.51) : def;  // Conquest wins at 51% of Defense
  const willBreak=modOff>need;
  return {atk,tgt,def,need,modOff,genB,willBreak,
    acres: willBreak?estLandGain(atk,tgt,e,x.type):0,
    removed: willBreak?estLandRemoved(atk,tgt,e,x.type):0,
    loss: estOffLoss(atk,x.off,x.type),
    rnw: atk&&tgt?rpnwRatio(atk,tgt)*100:0,
    atime: atk&&tgt?estAttackTime(atk,tgt,e,x.type):0};
}
function estOffLoss(atk,offSent,type){
  let rate=(STATE.settings.casRate||7.5)/100;
  if(type==="ambush") rate*=1.15;                 // Ambush +15% casualties
  if(atk && atk.race==="Undead") rate*=0.55;      // Undead −45% military losses
  if(atk && atk.race==="Halfling") rate*=1.10;    // Halfling +10% casualties
  return Math.round(num(offSent)*rate);
}
function maxPopOf(p){ // modified living space (estimate from land if not supplied)
  if(num(p.maxpop)>0) return num(p.maxpop);
  if(num(p.land)>0) return Math.round(num(p.land)*(STATE.settings.lsPerAcre||22));
  return 0;
}
function overpopLevel(pop,maxpop){
  if(!pop||!maxpop) return null;
  const r=pop/maxpop;
  if(r<=1.0005) return {lvl:0,r,label:"OK"};
  if(r<1.15) return {lvl:1,r,label:"L1 · −peas"};
  if(r<1.30) return {lvl:2,r,label:"L2 · no-atk"};
  if(r<1.40) return {lvl:3,r,label:"L3 · −50% inc"};
  return {lvl:4,r,label:"L4 · no-thv"};
}
const OP_CLR=["var(--txt3)","var(--amber)","var(--red2)","var(--red2)","var(--red2)"];
function landRemovedFromTarget(targetId){
  const e=curEnemy(); if(!e) return 0;
  return e.wave.filter(w=>w.target===targetId && w.cat!=="tm").reduce((a,w)=>{
    const d=deriveAttack(e,w); return a+(d.willBreak?d.removed:0);
  },0);
}
function projectedOverpop(tgt){ // {now, after, removed, newMax} or null if no pop intel
  const pop=num(tgt.pop); if(!pop) return null;
  const maxNow=maxPopOf(tgt); if(!maxNow) return null;
  const land=num(tgt.land); if(!land) return null;
  const removed=landRemovedFromTarget(tgt.id);
  const newLand=Math.max(1,land-removed);
  const newMax=Math.round(maxNow*(newLand/land));
  return {now:overpopLevel(pop,maxNow), after:overpopLevel(pop,newMax), removed, newMax, maxNow, pop};
}
function opChip(ol){
  if(!ol) return `<span class="dim" style="font-size:10px">no pop intel</span>`;
  const c=OP_CLR[ol.lvl];
  return `<span class="mono" style="color:${c};font-size:11.5px;font-weight:700">${ol.label} · ${Math.round(ol.r*100)}%</span>`;
}

function isTM(p){ return num(p.offense)<=0 || num(p.offense) < num(p.defense)*0.15; }  // all-def / no-off province
const SORTS=[
  ["default","Import order"],
  ["atk_only","⚔ Attackers only"],
  ["tm_only","🔮 TMs only (def, no off)"],
  ["nw_hi","NW · highest"],["nw_lo","NW · lowest"],

  ["wpa_hi","WPA · highest"],["wpa_lo","WPA · lowest"],
  ["left_hi","Off left · highest"],
];
function sortProvs(list,key,isMine){
  if(key==="default") return list;
  if(key==="atk_only") return list.filter(p=>!isTM(p)).sort((a,b)=>(isMine?effOffense(b):num(b.offense))-(isMine?effOffense(a):num(a.offense)));
  if(key==="tm_only")  return list.filter(p=>isTM(p)).sort((a,b)=>num(b.defense)-num(a.defense));
  const dir=key.endsWith("_lo")?1:-1;
  const f=key.split("_")[0];
  const val=p=>{
    if(f==="nw") return num(p.nw);
    if(f==="off") return isMine?effOffense(p):num(p.offense);
    if(f==="def") return num(p.defense);
    if(f==="land") return num(p.land);
    if(f==="tpa") return num(p.tpa);
    if(f==="wpa") return num(p.wpa);
    if(f==="left") return Math.max(0,leftoverOff(p));
    return 0;
  };
  return list.slice().sort((a,b)=>dir*(val(a)-val(b)));
}

      <div><span class="wb-title">📋 YOUR WAVE</span> <span class="wb-count">${waveCount} attack${waveCount===1?"":"s"} queued vs ${esc(e.name)}</span></div>
      <div class="btnrow">
        <button class="btn gold sm" data-act="savewave" ${waveCount?"":"disabled"}>💾 Save Wave</button>
        ${savedCount?`<button class="btn ghost sm" data-act="restorewave">↩ Restore (${savedCount})</button>`:""}
        <button class="btn ghost sm" data-act="exportwave">⬇ Spreadsheet</button>
        ${waveCount?`<button class="btn ghost sm red" data-act="clearwave">🗑 Clear Wave</button>`:""}
      </div>
    </div>
    ${waveLists(e)}
  </div>
  ${waveByProv(e)}`;
}

function waveByProv(e){
  const groups={};
  e.wave.forEach(w=>{ (groups[w.attacker]=groups[w.attacker]||[]).push(w); });
  const order=STATE.myKd.provinces.map(p=>p.id);
  const ids=Object.keys(groups).sort((a,b)=>order.indexOf(a)-order.indexOf(b));
  let body;
  if(!ids.length){
    body=`<div class="empty">No attacks assigned yet — tap a province, then tap a target above.</div>`;
  } else {
    body=`<div class="plist">`+ids.map(id=>{
      const atk=mp(id), list=groups[id];
      const items=list.map(w=>{
        const tgt=e.provinces.find(p=>p.id===w.target);
        if(w.cat==="tm") return `<div class="bp-atk"><span class="arrow">→</span> ${esc(tgt?tgt.name:"?")} · <span class="cat-tm">TM ${esc(w.op||"op")}</span></div>`;
        const d=deriveAttack(e,w), at=ATTACK_TYPES.find(a=>a.k===w.type);
        const v=d.willBreak?`<span class="verdict-ok">✓ break</span>`:`<span class="verdict-no">✗ short ${fmtK(Math.max(0,d.need-d.modOff))}</span>`;
        return `<div class="bp-atk"><span class="arrow">→</span> ${esc(tgt?tgt.name:"?")} · <span class="cat-${w.cat}">${w.cat}</span> · ${at?at.n:w.type} · ${fmtK(w.off)} off · ${v}</div>`;
      }).join("");
      return `<div class="byprov"><div class="bp-name">🛡 ${esc(atk?atk.name:"Unknown prov")} <span class="c">${list.length} attack${list.length===1?"":"s"}</span></div><div class="bp-atks">${items}</div></div>`;
    }).join("")+`</div>`;
  }
  return `<div class="panel" style="margin-top:18px">
    <div class="panel-h"><h3>🗂 Attack List — by Province</h3><span class="cnt">${ids.length} prov${ids.length===1?"":"s"} attacking</span></div>
    ${body}
  </div>`;
}

function targetListPanel(e){
  const targets=(e.targets||[]).map(id=>e.provinces.find(p=>p.id===id)).filter(Boolean);
  const atk = selAtk ? STATE.myKd.provinces.find(p=>p.id===selAtk) : null;
  const refv = atk ? num(atk.nw) : refNW();
  const rows = targets.length ? targets.map(p=>{
    const pct=refv?num(p.nw)/refv*100:0;
    return `<div class="lrow ${selTgt===p.id?"sel":""}" style="cursor:pointer">
      <div class="lr-main" data-act="seltgt:${p.id}">
        <div class="lr-name">${esc(p.name)} <span class="pill sm ${inRange(pct)?"in":"out"}">${refv?pctTxt(pct):"—"}</span></div>
        <div class="lr-sub">NW ${fmtK(p.nw)} · def ${fmtK(p.defense)} · ${fmtK(p.land)}A${p.armyOut?' · <span class="army-out">OUT</span>':''}</div>
      </div>
      <div class="lr-right">
        <button class="btn xs gold" data-act="assign:${p.id}">＋</button>
        <button class="btn xs ghost" data-act="target:${p.id}">★</button>
      </div>
    </div>`;
  }).join("") : "";
  return `<details class="panel cpanel" open><summary>
    <div class="panel-h"><h3>📌 My Targets</h3><span class="cnt">${targets.length}</span></div></summary>
    <div class="dropzone" data-dz="targets">⬇ drag an enemy here, or tap ☆ to add</div>
    ${rows?`<div class="plist tlist">${rows}</div>`:`<div class="empty" style="padding:14px">No targets queued yet.</div>`}
  </details>`;
}

function armyHomePanel(e){
  const home=e.provinces.filter(p=>!p.armyOut);
  const atk = selAtk ? STATE.myKd.provinces.find(p=>p.id===selAtk) : null;
  const refv = atk ? num(atk.nw) : refNW();
  const rows=home.map(p=>{
    const pct=refv?num(p.nw)/refv*100:0;
    return `<div class="lrow">
      <div class="lr-main">
        <div class="lr-name">${esc(p.name)} <span class="pill sm ${inRange(pct)?"in":"out"}">${refv?pctTxt(pct):"—"}</span></div>
        <div class="lr-sub">NW ${fmtK(p.nw)} · def ${fmtK(p.defense)} · ${fmtK(p.land)}A</div>
      </div>
      <div class="lr-right"><button class="btn xs gold" data-act="assign:${p.id}">＋</button></div>
    </div>`;
  }).join("");
  return `<details class="panel cpanel" open><summary>
    <div class="panel-h"><h3>🏠 Army Home</h3><span class="cnt">${home.length} not out</span></div></summary>
    ${home.length?`<div class="plist">${rows}</div>`:`<div class="empty" style="padding:14px">All enemy armies are out.</div>`}
  </details>`;

function summaryBar(){
  const ps=STATE.myKd.provinces;
  const totOff=ps.reduce((a,p)=>a+effOffense(p),0);
  const usedOff=ps.reduce((a,p)=>a+Math.min(committedOff(p.id),effOffense(p)),0);
  const totGen=ps.reduce((a,p)=>a+num(p.generals),0);
  const usedGen=ps.reduce((a,p)=>a+committedGen(p.id),0);
  const w=activeWave();
  const e=curEnemy();
  let breaks=0, projLand=0, projLoss=0;
  w.forEach(x=>{ if(x.cat!=="tm"){ const d=deriveAttack(e,x); if(d.willBreak){breaks++; projLand+=d.acres;} projLoss+=d.loss; } });
  return `
  <div class="sumbar">
    <div class="sumcell"><div class="k">Offense left</div><div class="v">${fmt(totOff-usedOff)}<small> / ${fmt(totOff)}</small></div></div>
    <div class="sumcell"><div class="k">Generals left</div><div class="v">${totGen-usedGen}<small> / ${totGen}</small></div></div>
    <div class="sumcell"><div class="k">Attacks queued</div><div class="v">${w.filter(x=>x.cat!=="tm").length}<small> + ${w.filter(x=>x.cat==="tm").length} TM</small></div></div>
    <div class="sumcell"><div class="k">Breaking hits</div><div class="v" style="color:var(--green2)">${breaks}</div></div>
    <div class="sumcell"><div class="k">Est. land gain</div><div class="v" style="color:var(--gold2)">+${fmt(projLand)}<small> ac</small></div></div>
    <div class="sumcell"><div class="k">Est. off losses</div><div class="v" style="color:var(--red2)">−${fmt(projLoss)}</div></div>
  </div>`;
}

function myProvTable(){
  const ps=sortProvs(STATE.myKd.provinces,mySort,true), e=curEnemy(), eAvg=kdAvgNW(e);
  if(!ps.length) return `<div class="empty">No provinces. <a class="lnk" data-act="nav:mykd">Add or import your kingdom →</a></div>`;
  const tgtSel = selTgt && e ? e.provinces.find(x=>x.id===selTgt) : null;
  const hint = tgtSel ? `<div class="selhint"><span>Target: <b style="color:var(--head)">${esc(tgtSel.name)}</b> · def ${fmtK(tgtSel.defense)} — green = in range; tap a prov to assign</span><span class="clr" data-act="seltgt:${tgtSel.id}">clear ✕</span></div>` : "";
  const rows=ps.map((p,idx)=>{
    const eff=effOffense(p), lo=leftoverOff(p), lg=leftoverGen(p);
    const pct=eAvg?num(p.nw)/eAvg*100:0;
    const tpct=tgtSel?num(tgtSel.nw)/Math.max(1,num(p.nw))*100:0;
    const rngCls=tgtSel?(inRange(tpct)?"rng-in":"rng-out"):"";
    const loCls=lo>=eff?"full":(lo>0?"part":"none");
    const lgCls=lg>=num(p.generals)?"full":(lg>0?"part":"none");
    const fanaCap=!!p.fana, blCap=!!p.bl;
    const isUD = (p.race||"").toLowerCase()==="undead";
    const tmTag = isTM(p) ? ` <span class="tag" style="color:var(--blue);font-size:9.5px;padding:1px 6px">TM</span>` : "";
    return `<div class="lrow atk-pick ${selAtk===p.id?"sel":""} ${rngCls}">
      <div class="lr-main" data-act="selatk:${p.id}">
        <div class="lr-name"><b>#${idx+1} ${esc(p.name)}</b>${isUD?` <span class="plague" title="Undead — spreads plague">🦠</span>`:""}${tmTag}${eAvg?` <span class="pill sm ${inRange(pct)?"in":"out"}">${pctTxt(pct)}</span>`:""}</div>
        <div class="lr-sub">${esc(p.race||"?")}${p.pers?" · "+esc(p.pers):""} · NW <b>${fmtK(p.nw)}</b> · off <b>${fmtK(eff)}</b> · gen ${num(p.generals)}</div>
      </div>
      <div class="lr-ctrl">
        <span class="chip ${fanaCap?"":"nocap"} ${p.fanaOn&&fanaCap?"on":""}" data-act="${fanaCap?"togglefana:"+p.id:""}">F</span>
        <span class="chip bl ${blCap?"":"nocap"} ${p.blOn&&blCap?"on":""}" data-act="${blCap?"togglebl:"+p.id:""}">BL</span>
        <span class="gtag">gens</span><span class="ministep"><button data-act="gen-:${p.id}">−</button><b>${num(p.generals)}</b><button data-act="gen+:${p.id}">＋</button></span>
        <div class="leftbox"><span>left</span><b class="${loCls}">${fmtK(Math.max(0,lo))}</b></div>
      </div>
    </div>`;
  }).join("");
  return `${hint}<div class="plist">${rows}</div>`;
}

function enemyTable(e){
  if(!e.provinces.length) return `<div class="empty">No enemy intel. <a class="lnk" data-act="nav:import">Import enemy CSV →</a></div>`;
  const targets0=e.targets||[];
  if(starOnly && !targets0.length) return `<div class="empty">⭐ Showing starred only, but no targets are starred yet.<br><a class="lnk" data-act="staronly">Show all provinces →</a></div>`;
  const atk = selAtk ? STATE.myKd.provinces.find(p=>p.id===selAtk) : null;
  const refv = atk ? num(atk.nw) : refNW();
  const targets = e.targets||[];
  const hint = atk ? `<div class="selhint"><span>Attacker: <b style="color:var(--head)">${esc(atk.name)}</b> · ${fmtK(Math.max(0,leftoverOff(atk)))} off left — tap a target to assign as <select id="quickType" class="qtype">${ATTACK_TYPES.map(a=>`<option value="${a.k}" ${a.k===quickType?"selected":""}>${a.n}</option>`).join("")}</select></span><span class="clr" data-act="selatk:${atk.id}">clear ✕</span></div>` : "";
  let plist=sortProvs(e.provinces,enSort,false);
  if(starOnly) plist=plist.filter(p=>targets0.includes(p.id));
  const rows=plist.map((p,idx)=>{
    const pct=refv?num(p.nw)/refv*100:0;
    const inr=inRange(pct);
    const rngCls = atk ? (inr?"rng-in":"rng-out") : "";
    const assigned=activeWave().filter(w=>w.target===p.id);
    const op=projectedOverpop(p);
    const opTag = op && op.now && op.now.lvl>0 ? `<span class="opmini" style="color:${OP_CLR[op.now.lvl]};background:var(--bg2)">${op.now.label.split(" ")[0]}</span>` : "";
    const army = p.armyOut
      ? `<span class="army-out">⚔ OUT${p.returnTick?" t"+(num(p.returnTick)-STATE.tick):""}${p.incomingLand?" +"+fmtK(p.incomingLand)+"A":""}</span>`
      : `<span class="army-home">⌂ home</span>`;
    const tpa = p.tpa!=null&&p.tpa!==""?fmt1(p.tpa):"?";
    const wpa = p.wpa!=null&&p.wpa!==""?fmt1(p.wpa):"?";
    const cast=p.sci&&p.sci.cast!=null?p.sci.cast:null, wts=p.sci&&p.sci.wts!=null?p.sci.wts:null;
    const exp = expProv===p.id ? `<div class="lr-stats" style="margin-top:4px;padding:6px 8px;background:var(--bg2);border-radius:7px">
      <span>OFF <b>${p.offense?fmtK(p.offense):"?"}</b></span>
      <span>mdTPA <b>${p.mdtpa!=null&&p.mdtpa!==""?fmt1(p.mdtpa):"?"}</b></span>
      <span>mdWPA <b>${p.mdwpa!=null&&p.mdwpa!==""?fmt1(p.mdwpa):"?"}</b></span>
      <span>Pop <b>${p.pop?fmtK(p.pop):"?"}</b></span>
      <span>Honor <b>${p.honor?fmtK(p.honor):"?"}</b></span>
      <span>Gens out <b>${p.generalsUsed||0}</b></span></div>` : "";
    const asg = assigned.length ? `<div class="asgs" style="margin-top:6px">${assigned.map(w=>{
        const d=deriveAttack(e,w); const cls=w.cat==="tm"?"":(d.willBreak?"brk":"fail");
        const a2=STATE.myKd.provinces.find(x=>x.id===w.attacker);
        return `<span class="asg mini ${cls}">${w.cat==="tm"?"TM":esc(a2?a2.name:"?")}<span class="x" data-act="delwave:${w.id}">×</span></span>`;
      }).join("")}</div>` : "";
    const starred = targets.includes(p.id);
    const tmTag = isTM(p) ? ` <span class="tag" style="color:var(--blue);font-size:9.5px;padding:1px 6px">TM</span>` : "";
    return `<div class="lrow ${rngCls} ${atk?"qa":""}" draggable="true" data-prov="${p.id}">
      <div class="lr-main" data-act="${atk?"quickassign":"expprov"}:${p.id}">
        <div class="lr-name"><span class="star ${starred?"on":""}" data-act="target:${p.id}">${starred?"★":"☆"}</span> <b>#${idx+1} ${esc(p.name)}</b>${tmTag} <span class="pill sm ${inr?"in":"out"}">${refv?pctTxt(pct):"—"}</span> ${opTag}</div>
        <div class="lr-sub">${esc(p.race||"?")}${p.pers?" · "+esc(p.pers):""} · ${fmt(p.land)} Acres · ${army}</div>
        <div class="lr-stats">
          <span>NW <b>${fmtK(p.nw)}</b></span>
          <span>RNW <b class="${inr?"g":"r"}">${refv?pctTxt(pct):"—"}</b></span>
          <span>TPA <b>${tpa}</b></span>
          <span>WPA <b>${wpa}</b></span>
          <span>Cast <b>${cast!=null?cast+"%":"?"}</b></span>
          <span>WT <b>${wts!=null?wts+"%":"?"}</b></span>
        </div>
        ${exp}${asg}
      </div>
      <div class="lr-right">
        <div class="lr-def"><span>def</span><b>${fmtK(p.defense)}</b></div>
        <button class="btn xs gold" data-act="assign:${p.id}">＋</button>
        <button class="btn xs ghost" data-act="editenemy:${p.id}">✎</button>
      </div>
    </div>`;
  }).join("");
  return `${hint}<div class="plist">${rows}</div>`;
}

function waveLists(e){
  return `<div class="wave-cols">
    ${catCol(e,"mass","Mass Targets","🟡","mass")}
    ${catCol(e,"chain","Chain Targets","🔴","chain")}
    ${tmCol(e)}
  </div>`;
}
function catCol(e,key,label,icon,cls){
  const items=e.wave.filter(x=>x.cat===key);
  const der=items.map(x=>deriveAttack(e,x));
  const totGain=der.reduce((a,d)=>a+(d.willBreak?d.acres:0),0);
  const totLoss=der.reduce((a,d)=>a+d.loss,0);
  const brk=der.filter(d=>d.willBreak).length;
  const sub = items.length ? `${brk}/${items.length} break \u00b7 +${fmt(totGain)} ac \u00b7 \u2212${fmt(totLoss)} loss` : "nothing assigned yet";
  let cards;
  if(!items.length){
    cards=`<div class="empty">Tap <b>Assign attack</b> on a target, choose <b>${label.split(" ")[0]}</b>.</div>`;
  } else {
    cards=items.map((x,i)=>{
      const d=der[i], atk=d.atk, tgt=d.tgt;
      const at=ATTACK_TYPES.find(a=>a.k===x.type);
      const op=tgt?projectedOverpop(tgt):null;
      const verdict=d.willBreak?`<span class="verdict-ok">\u2713 BREAK</span>`:`<span class="verdict-no">\u2717 \u2212${fmt(d.def-num(x.off))}</span>`;
      return `<div class="wcard ${d.willBreak?"brk":"fail"}">
        <button class="del" data-act="delwave:${x.id}">\u00d7</button>
        <button class="del mv" data-act="movewave:${x.id}" title="Move to ${key==="mass"?"Chain":"Mass"}">\u21c4</button>
        <div class="wc-top">${esc(atk?atk.name:"?")} <span class="arrow">\u2192</span> ${esc(tgt?tgt.name:"?")}</div>
        <div class="wc-line2"><span class="tag">${at?at.n:x.type}</span> <span class="mono" style="font-size:12px">${fmt(x.off)} / ${fmt(d.def)}</span> ${verdict}</div>
        <div class="wc-stats">
          <span>RNW <b style="color:${inRange(d.rnw)?'var(--green2)':'var(--red2)'}">${d.rnw?pctTxt(d.rnw):"\u2014"}</b></span>
          <span class="g">+${fmt(d.acres)} ac</span>
          <span class="r">\u2212${fmt(d.loss)}</span>
          <span>${d.atime}t</span>
          ${op?`<span>OP ${opChip(op.after)}</span>`:""}
        </div>
      </div>`;
    }).join("");
  }
  return `<div class="panel"><div class="wcol-h ${cls}"><span class="t">${icon} ${label} <span class="tag">${items.length}</span></span><span class="s">${sub}</span></div><div class="wcards">${cards}</div></div>`;
}
function tmCol(e){
  const items=e.wave.filter(x=>x.cat==="tm");
  const sub=items.length?`${items.length} op${items.length>1?"s":""} queued`:"nothing assigned yet";
  let cards;
  if(!items.length){
    cards=`<div class="empty">Tap <b>Assign attack</b> on a target, choose <b>TM / Op</b>.</div>`;
  } else {
    cards=items.map(x=>{
      const d=deriveAttack(e,x), atk=d.atk, tgt=d.tgt;
      const op=tgt?projectedOverpop(tgt):null;
      return `<div class="wcard">
        <button class="del" data-act="delwave:${x.id}">\u00d7</button>
        <div class="wc-top">${esc(atk?atk.name:"?")} <span class="arrow">\u2192</span> ${esc(tgt?tgt.name:"?")}</div>
        <div class="wc-line2"><span class="tag" style="color:var(--blue)">${esc(x.op||"op")}</span>${x.floor?` <span class="tag">until ${esc(x.floor)}</span>`:""}</div>
        <div class="wc-stats">
          <span>TPA <b>${tgt&&tgt.tpa!==""?fmt1(tgt.tpa):"?"}</b></span>
          <span>WPA <b>${tgt&&tgt.wpa!==""?fmt1(tgt.wpa):"?"}</b></span>
          ${op?`<span>OP ${opChip(op.now)}</span>`:""}
        </div>
      </div>`;
    }).join("");
  }
  return `<div class="panel"><div class="wcol-h tm"><span class="t">\ud83d\udd35 TM / Ops <span class="tag">${items.length}</span></span><span class="s">${sub}</span></div><div class="wcards">${cards}</div></div>`;
}

// ===== REAL WAR ATTACK LOG (parsed from actual kingdom news) =====
// Parse every attack line in a news page and record real attacks into STATE.warLog (deduped).
function recordWarAttacks(txt){
  if(!txt) return 0;
  STATE.warLog = STATE.warLog || [];
  const seen = new Set(STATE.warLog.map(a=>a.sig));
  const myLoc = (STATE.myKd && STATE.myKd.loc) || "";
  let added = 0;
  const lines = txt.split(/\n+/);
  // date context: lines like "January 2 of YR7" set the current date for following attacks
  let curDate = "";
  for(const raw of lines){
    const L = raw.trim();
    const dm = L.match(/^([A-Z][a-z]+ \d{1,2} of YR\d+)/);
    if(dm){ curDate = dm[1]; }
    // attack line: "N - Attacker (a:b) invaded M - Defender (c:d) and TYPE ..."
    const m = L.match(/\d+\s*-\s*(.+?)\s*\((\d{1,2}:\d{1,2})\)\s+invaded\s+\d+\s*-\s*(.+?)\s*\((\d{1,2}:\d{1,2})\)\s+and\s+(\w+)([^.]*)/i);
    if(!m) continue;
    const atkName=m[1].trim(), atkLoc=m[2], defName=m[3].trim(), defLoc=m[4], verb=m[5].toLowerCase(), rest=m[6]||"";
    // amount: acres or a number in the rest
    let amount=0, unit="";
    const am = rest.match(/([\d,]+)\s*acres/i);
    if(am){ amount=parseInt(am[1].replace(/,/g,""))||0; unit="acres"; }
    else { const nm=rest.match(/([\d,]{2,})/); if(nm){ amount=parseInt(nm[1].replace(/,/g,""))||0; unit="killed"; } }
    // map verb -> attack type
    let type="other";
    if(/captur/.test(verb)) type="traditional";
    else if(/raz/.test(verb)) type="raze";
    else if(/massacr/.test(verb)) type="massacre";
    else if(/plunder/.test(verb)) type="plunder";
    else if(/conquer/.test(verb)) type="conquest";
    else if(/ambush/.test(verb)) type="ambush";
    else if(/learn|stole/.test(verb)) type="thievery";
    // direction relative to MY kd
    let dir="other";
    if(atkLoc===myLoc) dir="ours";        // my province attacked someone
    else if(defLoc===myLoc) dir="theirs"; // someone attacked my province
    const sig = curDate+"|"+atkName+"|"+atkLoc+"|"+defName+"|"+defLoc+"|"+type+"|"+amount;
    if(seen.has(sig)) continue;
    seen.add(sig);
    STATE.warLog.push({sig, date:curDate, atkName, atkLoc, defName, defLoc, type, amount, unit, dir, ts:Date.now()});
    added++;
  }
  if(added) STATE._warRev = Date.now();
  return added;
}
// Totals for the war log, split by direction and the two KD locations
function warDateValue(ds){
  const months={january:1,february:2,march:3,april:4,may:5,june:6,july:7,august:8,september:9,october:10,november:11,december:12};
  const m=String(ds).match(/([A-Za-z]+)\s+(\d{1,2})\s+of\s+YR(\d+)/i);
  if(!m) return 0;
  const mo=months[m[1].toLowerCase()]||0;
  return Number(m[3])*10000 + mo*50 + Number(m[2]);
}
function warLogStats(enemyLoc, sinceDate){
  const myLoc=(STATE.myKd&&STATE.myKd.loc)||"";
  const log=STATE.warLog||[];
  const blank=()=>({attacks:0,trad:0,raze:0,massacre:0,plunder:0,conquest:0,ambush:0,land:0,killed:0});
  const ours=blank(), theirs=blank();
  const sinceV = sinceDate ? warDateValue(sinceDate) : 0;
  for(const a of log){
    // war-start filter: skip attacks before the declared war date
    if(sinceV && warDateValue(a.date) && warDateValue(a.date) < sinceV) continue;
    // only count attacks between my KD and the enemy KD (this war)
    const involvesUs = a.atkLoc===myLoc || a.defLoc===myLoc;
    const involvesEnemy = a.atkLoc===enemyLoc || a.defLoc===enemyLoc;
    if(!involvesUs || !involvesEnemy) continue;
    const side = (a.atkLoc===myLoc) ? ours : theirs;
    side.attacks++;
    if(side[a.type]!=null) side[a.type]++;
    if(a.unit==="acres") side.land+=a.amount;
    if(a.unit==="killed"||a.type==="massacre") side.killed+=a.amount;
  }
  return {ours, theirs};
}
function killStats(e){
  let attacks=0,breaks=0,masses=0,land=0,peas=0,thieves=0,wiz=0,popDestroy=0;
  const war=e.warMode==="in";
  e.wave.forEach(x=>{
    if(x.cat==="tm") return;
    attacks++;
    const d=deriveAttack(e,x), tgt=d.tgt, atk=d.atk; if(!tgt) return;
    if(!d.willBreak) return;
    breaks++; land+=d.acres;
    if(atk && atk.pers==="Warrior" && num(tgt.pop)) popDestroy+=num(tgt.pop)*0.01;   // Battle Cry
    if(x.type==="massacre"){
      masses++;
      const tLand=num(tgt.land), tThieves=num(tgt.tpa)*tLand, tWiz=num(tgt.wpa)*tLand;
      const tPeas=Math.max(0,num(tgt.pop)-tThieves-tWiz);
      let pP=0.095,pT=0.075,pW=0.05;
      if(atk && atk.pers==="War Hero"){ pP+=0.07; pT+=0.025; pW+=0.025; }            // Heroes' Culling
      const mult=war?2:1;
      peas+=tPeas*pP*mult; thieves+=tThieves*pT*mult; wiz+=tWiz*pW*mult;
    }
  });
  return {attacks,breaks,masses,land:Math.round(land),peas:Math.round(peas),thieves:Math.round(thieves),wiz:Math.round(wiz),popDestroy:Math.round(popDestroy)};
}
// REAL war scoreboard from the parsed news attack log
function warScoreboard(e){
  if(!e) return "";
  STATE.warStartDate = STATE.warStartDate || "";
  const mode = window.__warMode || "war";

      <tbody>
        ${row("Total attacks",o.attacks,t.attacks)}
        ${row("Traditional March",o.traditional||0,t.traditional||0)}
        ${row("Razes",o.raze,t.raze)}
        ${row("Conquests",o.conquest,t.conquest)}
        ${row("Plunders",o.plunder,t.plunder)}
        ${row("Massacres",o.massacre,t.massacre,"var(--red2)","var(--red2)")}
        ${row("Ambushes",o.ambush,t.ambush)}
        ${row("Land taken (A)",f(o.land),f(t.land),"var(--green2)","var(--red2)")}
        ${o.killed||t.killed?row("Killed (massacre)",f(o.killed),f(t.killed),"var(--red2)","var(--red2)"):""}
      </tbody>

function viewGraphs(){
  const e=curEnemy();
  const mode = (graphSide==="mine"||graphSide==="totals")?graphSide:"enemy";
  const toggle=`<div class="flex between pwrap" style="margin-bottom:16px;gap:12px">
    <div class="seg">
      <button data-act="graphside:enemy" class="${mode==="enemy"?"on":""}">🎯 Enemy KD</button>
      <button data-act="graphside:mine" class="${mode==="mine"?"on":""}">🛡 My KD</button>
      <button data-act="graphside:totals" class="${mode==="totals"?"on":""}">⚖ KD Totals</button>
    </div>
    <span class="note">${mode==="totals"?"whole-kingdom comparison":esc(mode==="mine"?STATE.myKd.name:(e?e.name:"—"))}</span>
  </div>`;
  const kc = e ? warScoreboard(e) : "";

  if(mode==="totals"){
    const mine=STATE.myKd.provinces, en=e?e.provinces:[];
    if(!mine.length && !en.length) return toggle+kc+emptyState("📊","No kingdoms to compare","Import your KD and an enemy KD.",`<button class="btn gold" data-act="nav:import">Import data</button>`);
    const mt=kdTotals(mine,true), et=kdTotals(en,false);
    const charts=[
      compareChart("Total Networth",mt.nw,et.nw),
      compareChart("Total Land (A)",mt.land,et.land),
      compareChart("Total Honor",mt.honor,et.honor),
      compareChart("Total Offense",mt.off,et.off),
      compareChart("Total Defense",mt.def,et.def),
      compareChart("Total Wizards (≈ WPA×A)",mt.wiz,et.wiz),
      compareChart("Total Thieves (≈ TPA×A)",mt.thieve,et.thieve),
      compareChart("Avg NW / Acre",mt.land?mt.nw/mt.land:0,et.land?et.nw/et.land:0,n=>fmt(Math.round(n))),
    ].join("");
    return toggle+kc+`<div class="note" style="margin-bottom:10px">🛡 <b>${esc(STATE.myKd.name)}</b> (${mt.n}) vs 🎯 <b>${esc(e?e.name:"—")}</b> (${et.n})</div><div class="graph-grid">${charts}</div>`;
  }

  const useMine = mode==="mine";
  const provs = useMine ? STATE.myKd.provinces : (e?e.provinces:[]);
  if(!provs.length) return toggle+kc+emptyState("📊","No provinces to chart",useMine?"Add or import your kingdom.":"Select or import an enemy KD.",
    `<button class="btn gold" data-act="nav:import">Import data</button>`);
  const g=(fn)=>provs.map(p=>({name:p.name,val:Math.round(num(fn(p)))}));
  const nwpa=()=>provs.map(p=>({name:p.name,val:num(p.land)?Math.round(num(p.nw)/num(p.land)):0}));
  const charts=[
    barChart("Networth", g(p=>p.nw), "var(--gold)"),
    barChart("Land (A)", g(p=>p.land), "var(--teal)"),
    barChart("Honor", g(p=>p.honor), "var(--amber)"),
    barChart(useMine?"Offense (effective)":"Offense", g(p=>useMine?effOffense(p):p.offense), "var(--red)"),
    barChart("Defense", g(p=>p.defense), "var(--green)"),
    barChart("Wizards (≈ WPA × A)", g(p=>num(p.wpa)*num(p.land)), "var(--blue)"),
    barChart("Thieves (≈ TPA × A)", g(p=>num(p.tpa)*num(p.land)), "#e0a52e"),
    barChart("NW / Acre", nwpa(), "var(--gold2)", n=>fmt(n)),
  ].join("");
  return toggle+kc+`<div class="graph-grid">${charts}</div>`;
}

/*══════════════ EVENT BINDING ══════════════*/
function bindView(){
  // file inputs / dropzones
  function depositCSV(which,txt){
    const ta=document.getElementById(which==="my"?"pasteMy":"pasteEnemy"); if(ta)ta.value=txt;
    // auto-import immediately: my KD replaces; enemy merges into the active KD if one is selected, else creates new
    if(which==="my") doImportMy();
    else doImportEnemy(false);
  }
  document.querySelectorAll("[data-drop]").forEach(z=>{
    const which=z.dataset.drop;
    const inp=document.getElementById(which==="my"?"fileMy":"fileEnemy");
    z.addEventListener("click",()=>inp&&inp.click());
    z.addEventListener("dragover",ev=>{ev.preventDefault();z.classList.add("drag");});
    z.addEventListener("dragleave",()=>z.classList.remove("drag"));
    z.addEventListener("drop",ev=>{ev.preventDefault();z.classList.remove("drag");
      const f=ev.dataTransfer.files[0]; if(f) readFile(f,txt=>depositCSV(which,txt));});
  });
  const fm=document.getElementById("fileMy");
  if(fm) fm.addEventListener("change",e=>{const f=e.target.files[0];if(f)readFile(f,t=>depositCSV("my",t));});
  const fe=document.getElementById("fileEnemy");
  if(fe) fe.addEventListener("change",e=>{const f=e.target.files[0];if(f)readFile(f,t=>depositCSV("enemy",t));});
  const fj=document.getElementById("fileJson");
  if(fj) fj.addEventListener("change",e=>{const f=e.target.files[0];if(f)readFile(f,t=>restoreJson(t));});
  const refSel=document.getElementById("refSel");
  if(refSel) refSel.addEventListener("change",e=>mutate(()=>STATE.settings.refMode=e.target.value));
  const qt=document.getElementById("quickType");
  if(qt) qt.addEventListener("change",e=>{ quickType=e.target.value; });
  const ms=document.getElementById("mySort");
  if(ms) ms.addEventListener("change",ev=>{ mySort=ev.target.value; render(); });
  const es=document.getElementById("enSort");
  if(es) es.addEventListener("change",ev=>{ enSort=ev.target.value; render(); });
  const ik=document.getElementById("intelKd");
  if(ik) ik.addEventListener("change",ev=>{ intelKd=ev.target.value; render(); });
  // drag enemy rows -> target dropzone
  document.querySelectorAll('.lrow[draggable=true]').forEach(row=>{
    row.addEventListener("dragstart",ev=>{ ev.dataTransfer.setData("text/plain", row.dataset.prov); row.classList.add("dragging"); });

function toast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),2800);
}
function confirmDo(msg, fn, yesLabel){

document.addEventListener("click",ev=>{
  const t=ev.target.closest("[data-act]"); if(!t)return;

    case "selatk": if(selTgt){ selAtk=arg; quickAssign(selTgt); selAtk=null; } else { selAtk=(selAtk===arg?null:arg); render(); } break;
    case "seltgt": selTgt=(selTgt===arg?null:arg); selAtk=null; render(); break;

    case "expprov": expProv=(expProv===arg?null:arg); render(); break;
    case "target": mutate(()=>{ const e=curEnemy(); if(!e)return; if(!e.targets)e.targets=[];
      const i=e.targets.indexOf(arg); if(i>=0)e.targets.splice(i,1); else e.targets.push(arg); }); break;
    case "saveplan": save().then(()=>toast("Plan saved. You can close this and pick up where you left off.")); break;
    case "savewave": { const e=curEnemy(); if(e&&e.wave.length){ e.savedWave=JSON.parse(JSON.stringify(e.wave)); e.savedTargets=JSON.parse(JSON.stringify(e.targets||[])); save(); render();

    case "clearwave": confirmDo("Clear all attacks AND your target list for this kingdom? Tip: use Save Wave first if you might want it back.",()=>{ mutate(()=>{ const e=curEnemy(); if(e){ e.wave=[]; e.targets=[]; } }); toast("Wave and targets cleared."); },"Clear wave"); break;
    case "news": window.open(STATE.settings.newsUrl||"https://utopia-game.com/","_blank"); break;

    case "copywave": copyWaveText(); break;
    case "switchkd": mutate(()=>{STATE.activeEnemy=arg;VIEW="wave";}); break;

    case "togglemassfana": toggleMassFana(); break;
    case "togglebl": mutate(()=>{const p=mp(arg);p.blOn=!p.blOn;}); break;
    case "gen+": mutate(()=>{const p=mp(arg);p.generals=Math.min(MAX_GENERALS,num(p.generals)+1);}); break;

function quickAssign(targetId){
  const e=curEnemy(); if(!e) return;
  if(!selAtk){ openAssign(targetId); return; }   // no attacker chosen → full dialog
  const atk=mp(selAtk); if(!atk){ openAssign(targetId); return; }
  const tgt=e.provinces.find(p=>p.id===targetId); if(!tgt) return;
  const lo=Math.max(0,leftoverOff(atk)), lg=leftoverGen(atk);
  if(lo<=0){ toast(atk.name+" has no offense left — pick another province."); return; }
  if(lg<=0){ toast(atk.name+" has no generals left — pick another province."); return; }
  const gens=1;                                  // default: 1 general → most hits per province
  const need=Math.ceil(num(tgt.defense)*1.01);   // default: just 1% over their defense
  const off=Math.min(need, lo);                  // never send more than we have
  const existing=e.wave.filter(w=>w.target===targetId && w.cat!=="tm").length;
  // category follows the attack type: Massacre → Mass wave, others → Chain (your KD's structure)
  const cat = quickType==="massacre" ? "mass" : "chain";
  mutate(()=>{ e.wave.push({id:uid(),cat,target:targetId,attacker:selAtk,type:quickType||"march",off,gens}); });
  if(off<need) toast(atk.name+" only has "+fmtK(lo)+" left — short of the break ("+fmtK(need)+").");
}
function openAssign(targetId){
  const e=curEnemy(), tgt=e.provinces.find(p=>p.id===targetId);
  const avail=STATE.myKd.provinces.filter(p=>leftoverGen(p)>0 && leftoverOff(p)>0);
  // Plague priority: Undead provinces (with offense left) listed first so they get used to spread plague
  const isUD=p=>(p.race||"").toLowerCase()==="undead";
  const hasArmy=p=>Math.max(0,leftoverOff(p))>0 && leftoverGen(p)>0;
  const pickList = STATE.myKd.provinces.slice().sort((a,b)=>{
    const ta=isTM(a), tb=isTM(b);
    if(ta!==tb) return ta?1:-1;        // TMs (no offense) sink to the bottom
    const ua=isUD(a)&&hasArmy(a), ub=isUD(b)&&hasArmy(b);
    if(ua!==ub) return ua?-1:1;        // available Undead first (plague)
    return hasArmy(b)-hasArmy(a);      // then other available before exhausted
  });
  const firstUD = pickList.find(p=>isUD(p)&&hasArmy(p));
  const defaultAtk = selAtk || (firstUD?firstUD.id:null);   // default to a plague-capable Undead
  openModal(`<div class="mh"><h3>Assign Attack → ${esc(tgt.name)}</h3><button class="close" data-act="closemodal">×</button></div>

    <div class="frow f1" style="margin-bottom:10px">
      <div class="fld"><label>Wave category</label>
        <div class="seg" id="a_cat">
          <button data-cat="mass" class="on">Mass</button>
          <button data-cat="chain">Chain</button>
          <button data-cat="tm">TM / Op</button>
        </div>
      </div>
    </div>
    <div class="frow">
      <div class="fld"><label>Attacker province</label><select id="a_attacker">
        ${pickList.map(p=>{const lo=Math.max(0,leftoverOff(p)),lg=leftoverGen(p);const dis=lo<=0||lg<=0;
          return `<option value="${p.id}" ${dis?"disabled":""} ${p.id===defaultAtk&&!dis?"selected":""}>${isUD(p)?"🦠 ":""}${esc(p.name)} — ${fmt(lo)} off / ${lg} gen${dis?" (exhausted)":""}</option>`;}).join("")}
      </select></div>
      <div class="fld" id="a_typewrap"><label>Attack type</label><select id="a_type">
        ${ATTACK_TYPES.map(a=>`<option value="${a.k}">${a.n}</option>`).join("")}
      </select></div>
    </div>
    <div class="frow" id="a_tmwrap" style="display:none">
      <div class="fld" style="grid-column:1/-1"><label>Operations — check all you want queued (optional floor, e.g. "2000 peas")</label>
        <div class="opgrid"><div class="opgrp">🔮 Spells</div>
          ${TM_SPELLS.map((o,i)=>`<label class="oprow"><input type="checkbox" class="opchk" value="${o}"> <span>${o}</span><input type="text" class="opfloor" data-op="${o}" placeholder="floor"></label>`).join("")}
          <div class="opgrp">🗡 Thievery</div>
          ${TM_THIEF.map((o,i)=>`<label class="oprow"><input type="checkbox" class="opchk" value="${o}"> <span>${o}</span><input type="text" class="opfloor" data-op="${o}" placeholder="floor"></label>`).join("")}
        </div></div>
      <div class="fld"></div>
    </div>
    <div class="frow" id="a_numwrap">
      <div class="fld"><label>Offense to send</label><input type="number" id="a_off" value="${Math.ceil(num(tgt.defense)*1.01)}"></div>
      <div class="fld"><label>Generals to send</label><input type="number" id="a_gens" min="1" max="5" value="1"></div>
    </div>
    <div class="apv" id="a_preview"></div>
  </div>
  <div class="mf"><button class="btn ghost" data-act="closemodal">Cancel</button><button class="btn gold" data-act="submitassign">Add to wave</button></div>`);

function updateAssignPreview(){

  const breaks = modOff>need;
  const margin = modOff-need;
  const acres = (atk && breaks)? estLandGain(atk,tgt,e,type) : 0;
  const removed = (atk && breaks)? estLandRemoved(atk,tgt,e,type) : 0;
  const loss = estOffLoss(atk,off,type);

  } else {

  }
  pv.innerHTML=`
    <div class="apv-row"><span class="k">Offense sent</span><span>${fmt(off)}${gens>1?` <span class="dim">×${genB.toFixed(2)} (${gens} gens) = ${fmt(modOff)}</span>`:""}</span></div>
    <div class="apv-row"><span class="k">${type==="conquest"?"Need (51% def)":"Defense"}</span><span>${fmt(need)} <span class="dim">def ${fmt(def)}</span></span></div>
    <div class="apv-row"><span class="k">Margin</span><span style="color:${breaks?'var(--green2)':'var(--red2)'}">${margin>=0?"+":""}${fmt(margin)}</span></div>
    <div class="apv-row"><span class="k">RNW (target / you)</span><span><span class="pill ${inRange(pct)?"in":"out"}" style="min-width:auto">${aNW?pctTxt(pct):"—"}</span> <span class="dim">×${(ratio||0).toFixed(2)} → gain f ${(gainFactor(atk,tgt,e)).toFixed(2)}</span></span></div>
    ${(TYPE_LAND[type]||type==="ambush")?`<div class="apv-row"><span class="k">${type==="raze"?"Land razed":type==="ambush"?"Land recovered (50% of their incoming "+fmt(num(tgt.incomingLand))+"A)":"Est. land gain"}</span><span style="color:${type==="raze"?'var(--red2)':'var(--green2)'}">${type==="raze"?"−"+fmt(removed):"+"+fmt(acres)} ac</span></div>`:""}
    <div class="apv-row"><span class="k">Est. your off losses</span><span style="color:var(--red2)">−${fmt(loss)}</span></div>
    <div class="apv-row"><span class="k">Attack time (${e.warMode==="in"?"war":"normal"})</span><span>${atk?estAttackTime(atk,tgt,e,type)+" ticks":"—"}</span></div>
    ${opLine}
    <div class="apv-verdict ${breaks?'v-break':'v-fail'}">${breaks?"✓ BREAKS DEFENSE":"✗ SHORT BY "+fmt(Math.abs(margin))}</div>`;
}

    mutate(()=>{ checked.forEach(opName=>{

/*══════════════ CSV PARSING ══════════════*/
function parseCSV(text){
  const rows=[]; let i=0,field="",row=[],q=false;
  text=text.replace(/\r\n/g,"\n").replace(/\r/g,"\n");
  while(i<text.length){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else { if(c==='"')q=true; else if(c===","){row.push(field);field="";} 
      else if(c==="\n"){row.push(field);rows.push(row);row=[];field="";} 
      else if(c==="\t"){row.push(field);field="";} else field+=c; }
    i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows.filter(r=>r.some(x=>x.trim()!==""));
}

function normHead(h){ return h.toLowerCase().replace(/[^a-z0-9]/g,""); }
function mapHeaders(headers){
  const norm=headers.map(normHead); const map={};
  for(const field in ALIAS){
    for(const a of ALIAS[field]){ const idx=norm.indexOf(a); if(idx>=0){ map[field]=idx; break; } }
  }
  return map;
}
function parseBool(v){ if(v==null)return false; const s=String(v).trim().toLowerCase();
  return ["yes","y","1","x","true","t","✓"].includes(s); }

function rowsToObjects(text){
  const rows=parseCSV(text); if(rows.length<2) return {map:{},objs:[]};
  const map=mapHeaders(rows[0]);
  const normHeaders=rows[0].map(h=>h.toLowerCase().replace(/[^a-z0-9]/g,""));
  const objs=rows.slice(1).map(r=>{
    const o={}; for(const f in map) o[f]=r[map[f]]!==undefined?r[map[f]].trim():"";
    if(o.name) o.name=o.name.replace(/[~\u00ac`*]+/g,"").replace(/\s*\(\d{1,2}:\d{1,2}\)\s*$/,"").trim();
    o.__raw=r; o.__headers=normHeaders;
    return o;
  }).filter(o=>o.name && !/^(total|average|avg|sum)$/i.test(o.name));
  return {map,objs};
}

function buildFullIntel(o){
  const intel={};

function doImportEnemy(merge){
  const txt=gv("pasteEnemy").trim();
  if(!txt){ toast("Paste or drop enemy CSV first."); return; }
  const {objs}=rowsToObjects(txt);
  if(!objs.length){ toast("Couldn't find any rows. First line must be a header with a 'province' column."); return; }
  const hasLoc=objs.some(o=>(o.kdloc||"").trim());
  if(hasLoc && !merge){
    const byKd={};
    objs.forEach(o=>{ const loc=(o.kdloc||"").trim(); (byKd[loc||"_none"]=byKd[loc||"_none"]||[]).push(o); });
    const homeLoc=(STATE.myKd&&STATE.myKd.loc||"").trim();
    let provCount=0, lastId=null, homeCount=0;
    mutate(()=>{
      for(const key in byKd){
        const realLoc=key==="_none"?"":key;
        // HOME-FOLD REMOVED: enemy imports never touch myKd. Provinces at my home loc route to an enemy KD at that location like any other.
        let kd=realLoc?Object.values(STATE.enemies).find(e=>(e.loc||"")===realLoc):null;
        if(!kd){ const nid=uid(); kd={id:nid,name:"KD "+(realLoc||"?"),loc:realLoc,status:"available",warMode:"out",eowcfExit:"",note:"",wave:[],targets:[],provinces:[],_rev:Date.now()}; STATE.enemies[nid]=kd; }
        else { const csvNm=(byKd[key][0]&&(byKd[key][0].kdname||byKd[key][0].kingdom))||""; if(csvNm && csvNm!==kd.name) kd.name=csvNm; }
        buildEnemyProvs(byKd[key]).forEach(np=>{ const ex=kd.provinces.find(p=>(p.name||"").toLowerCase()===np.name.toLowerCase());
          if(ex) Object.assign(ex,{...np,id:ex.id}); else kd.provinces.push(np); provCount++; });
        kd._rev=Date.now(); lastId=kd.id;
      }
      if(lastId) STATE.activeEnemy=lastId; VIEW=homeCount&&!provCount?"mykd":"wave";
    });
    save(); toast("Imported "+provCount+" enemy + "+homeCount+" home provinces by location.");
    return;
  }
  const provs=buildEnemyProvs(objs);
  if(merge && curEnemy()){
    const e=curEnemy();
    mutate(()=>{ provs.forEach(np=>{ const ex=e.provinces.find(p=>p.name.toLowerCase()===np.name.toLowerCase());
        if(ex){ Object.assign(ex,{...np,id:ex.id}); } else e.provinces.push(np); }); e._rev=Date.now(); VIEW="wave"; });
    save(); toast("Merged "+provs.length+" provinces into "+e.name+".");
  } else {
    const name=gv("enmName").trim()||"Enemy KD "+(Object.keys(STATE.enemies).length+1);
    const loc=gv("enmLoc").trim(); const nid=uid();
    mutate(()=>{ STATE.enemies[nid]={id:nid,name,loc,status:"available",warMode:"out",eowcfExit:"",note:"",wave:[],targets:[],provinces:provs,_rev:Date.now()};
      STATE.activeEnemy=nid; VIEW="wave"; });
    save(); toast("Created \""+name+"\" with "+provs.length+" provinces.");
  }
}

      op?(op.now.label.replace(/·/g,"")+" "+Math.round(op.now.r*100)+"%"):"—"]));});
  download("warwave_"+e.name.replace(/[^a-z0-9]+/gi,"_").toLowerCase()+".csv", L.join("\n"),"text/csv");
}
function copyWaveText(){

  const L=[];
  L.push("WAR WAVE vs "+e.name+" ("+(e.loc||"?")+")  ["+(e.warMode==="in"?"IN WAR":"OUT OF WAR")+"]");
  function sec(key,name){

  const tms=waveRowsFor(e,"tm");
  if(tms.length){ L.push(""); L.push("== TM/OPS ("+tms.length+") ==");
    tms.forEach(({x,d},i)=>L.push(pad((i+1)+".",3)+pad(d.atk?d.atk.name:"?",12)+"-> "+pad(d.tgt?d.tgt.name:"?",12)+" "+(x.op||"op")));}
