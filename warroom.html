let syncCursor=0, syncOn=false;
function applyParsedIntel(r){
  const e=curEnemy(); if(!e||!r||!r.kind||!r.name) return false;
  let p=e.provinces.find(x=>x.name.toLowerCase()===r.name.toLowerCase());
  let created=false;
  if(!p){ p={id:uid(),name:r.name,race:"",pers:"",land:0,nw:0,honor:0,defense:0,offense:0,tpa:"",wpa:"",mdtpa:"",mdwpa:"",armyOut:false,returnTick:0,incomingLand:0,generalsUsed:0,pop:0,maxpop:0}; e.provinces.push(p); created=true; }
  const f=r.fields;
  const setIf=(k,v)=>{ if(v!=null && v!=="" && !(typeof v==="number"&&isNaN(v))) p[k]=v; };
  setIf("race",f.race); setIf("pers",f.pers); setIf("land",f.land); setIf("nw",f.nw);
  setIf("honor",f.honor); setIf("pop",f.pop); setIf("maxpop",f.maxpop);
  setIf("offense",f.offense); setIf("defense",f.defense);
  if(f.tpa!=null){ p.mdtpa=f.tpa; if(!num(p.tpa)) p.tpa=f.tpa; }
  if(f.wpa!=null){ p.mdwpa=f.wpa; if(!num(p.wpa)) p.wpa=f.wpa; }
  if(f.armyOut!=null) p.armyOut=f.armyOut;
  if(f.returnTicks!=null){ p.armyOut=true; p.returnTick=STATE.tick+Math.ceil(f.returnTicks); }
  if(f.generalsUsed!=null) p.generalsUsed=f.generalsUsed;
  return true;
}
function routeFeedEntry(en){
  const txt=en.data_simple||""; if(!txt.trim()) return false;
  const u=(en.url||"").toLowerCase();
  const homeLoc=(STATE.myKd&&STATE.myKd.loc)||"";

  // 1) NEWS pages
  if(u.includes("news")){ const w=recordWarAttacks(txt); const p=parseNewsText(txt); return (w+p)>0; }

  // 2) KINGDOM SUMMARY pages (kingdom_details) -> create/update KD SHELL only, NEVER a province
  if(u.includes("kingdom_details")){
    let loc=null;
    const mu=u.match(/kingdom_details\/(\d{1,3})\/(\d{1,3})/);
    if(mu) loc=mu[1]+":"+mu[2];
    if(!loc){ const mt=txt.match(/\((\d{1,3}):(\d{1,3})\)/); if(mt) loc=mt[1]+":"+mt[2]; }
    if(!loc) return false;
    let nm=null;
    const mn=txt.match(/kingdom\s+of\s+([^()\n|]+?)\s*\(\d+:\d+\)/i);
    if(mn) nm=mn[1].trim(); if(!nm) nm="KD "+loc;
    // your own kingdom: update My Kingdom name + load its provinces, do not add an enemy
    if(homeLoc && loc===homeLoc){
      if(STATE.myKd){ STATE.myKd.name=nm; STATE.myKd.loc=loc; parseKingdomProvinces(txt, STATE.myKd, true); STATE.myKd._rev=Date.now(); }
      return true;
    }
    STATE.enemies=STATE.enemies||{};
    let e=Object.values(STATE.enemies).find(x=>(x.loc||"")===loc);
    if(!e){
      const nid=uid();
      e={id:nid,name:nm,loc:loc,status:"available",warMode:"out",eowcfExit:"",note:"",wave:[],targets:[],provinces:[],_rev:Date.now()};
      STATE.enemies[nid]=e;
      if(!STATE.activeEnemy) STATE.activeEnemy=nid;
    } else { e.name=nm; e._rev=Date.now(); }
    // try to auto-load province rows listed on the kingdom page (basic info only)
    parseKingdomProvinces(txt, e);
    return true;
  }

  // 3) INDIVIDUAL PROVINCE INTEL (SoT/SoM/SoS/Survey/Infiltrate) -> real province
  const r=parseIntelText(txt);
  if(!r||!r.kind||!r.name) return false;
  // find the province location from the page so we file it under the right KD
  let provLoc=null;
  const ml=txt.match(/\((\d{1,3}):(\d{1,3})\)/);
  if(ml) provLoc=ml[1]+":"+ml[2];
  // own kingdom province?
  if(homeLoc && provLoc===homeLoc){
    return applyProvinceTo(STATE.myKd, r, true);
  }
  // enemy: match KD by the province's location, else active enemy
  let kd=null;
  if(provLoc){ kd=Object.values(STATE.enemies||{}).find(x=>(x.loc||"")===provLoc); }
  if(!kd) kd=curEnemy();
  if(!kd) return false;
  return applyProvinceTo(kd, r);
}

// write a parsed province (r) into a KD's province list; only real intel creates a province
function cleanProvName(n){ let s=((n||"")+""); s=s.replace(/[~¬`*™]+/g,""); s=s.replace(/\s*\(\d{1,2}:\d{1,2}\)\s*$/,""); s=s.replace(/(?:TM)?\d[\d.,]*%.*$/i,""); s=s.replace(/\s+(?:TM|\(M\)|\(S\))\s*$/i,""); return s.trim(); }
function applyProvinceTo(kd, r){
  if(!kd||!r||!r.name) return false;
  if(!Array.isArray(kd.provinces)) kd.provinces=[];
  r.name=cleanProvName(r.name); let p=kd.provinces.find(x=>cleanProvName(x.name).toLowerCase()===r.name.toLowerCase());
  let created=false;
  if(!p){ p={id:uid(),name:r.name,race:"",pers:"",land:0,nw:0,honor:0,defense:0,offense:0,tpa:"",wpa:"",mdtpa:"",mdwpa:"",armyOut:false,returnTick:0,incomingLand:0,generalsUsed:0,pop:0,maxpop:0}; kd.provinces.push(p); created=true; }
  const f=r.fields;
  const setIf=(k,v)=>{ if(v!=null && v!=="" && !(typeof v==="number"&&isNaN(v))) p[k]=v; };
  setIf("race",f.race); setIf("pers",f.pers); setIf("land",f.land); setIf("nw",f.nw);
  setIf("honor",f.honor); setIf("pop",f.pop); setIf("maxpop",f.maxpop);
  setIf("offense",f.offense); setIf("defense",f.defense);
  if(f.tpa!=null){ p.mdtpa=f.tpa; if(!num(p.tpa)) p.tpa=f.tpa; }
  if(f.wpa!=null){ p.mdwpa=f.wpa; if(!num(p.wpa)) p.wpa=f.wpa; }
  if(f.armyOut!=null) p.armyOut=f.armyOut;
  if(f.returnTicks!=null){ p.armyOut=true; p.returnTick=(STATE.tick||0)+Math.ceil(f.returnTicks); }
  if(f.generalsUsed!=null) p.generalsUsed=f.generalsUsed;
  kd._rev=Date.now();
  return true;
}

/* Parse the province table from a kingdom_details page (WoL format).
   Rows: "Slot<TAB>Name<TAB>Race<TAB>Land acres<TAB>NetWorth gc<TAB>NW/Acre<TAB>Nobility".
   Empty slots are "-". Markers like *, (M), (S) are stripped from names. */
function parseKingdomProvinces(txt, kd, updateOnly){
  if(!txt||!kd) return 0;
  kd.provinces=kd.provinces||[];
  const races=["Avian","Dark Elf","Dwarf","Elf","Faery","Halfling","Human","Orc","Undead"];
  // isolate the Provinces section (between "Provinces" and "War Doctrines"/end)
  let body=txt;
  const pi=txt.search(/\bProvinces\b/);
  if(pi>=0){ body=txt.slice(pi); }
  const we=body.search(/War Doctrines/i); if(we>=0) body=body.slice(0,we);
  const lines=body.split(/\n+/);
  let added=0, seen=[];
  for(const raw of lines){
    const line=raw.replace(/\u00a0/g," ").replace(/\t+/g,"\t").trim();
    if(!line) continue;
    // split on tabs OR runs of 2+ spaces
    let cols=line.split(/\t|\s{2,}/).map(c=>c.trim()).filter(c=>c!=="");
    if(cols.length<4) continue;
    // first col must be a slot number
    if(!/^\d{1,3}$/.test(cols[0])) continue;
    // empty slot rows are just "N - - - - -"
    if(cols.slice(1).every(c=>c==="-")) continue;
    let name=(cols[1]||"").replace(/\*/g,"").replace(/\((?:M|S)\)/g,"").trim();
    if(!name||name==="-") continue;
    // find race among the remaining columns
    let race=""; for(const c of cols){ for(const r of races){ if(c.toLowerCase()===r.toLowerCase()){ race=r; break; } } if(race) break; }
    // edge case: name and race joined by a single space (e.g. "On-Amur Human")
    if(!race){ for(const r of races){ const rx=new RegExp("\\s+"+r.replace(/ /g,"\\s+")+"$","i"); if(rx.test(name)){ race=r; name=name.replace(rx,"").trim(); break; } } }
    // land = first "N acres" or first plain number after race
    let land=0; const lm=line.match(/([\d,]+)\s*acres/i); if(lm) land=parseInt(lm[1].replace(/,/g,""))||0;
    // net worth = first "N gc"
    let nw=0; const nwm=line.match(/([\d,]+)\s*gc/i); if(nwm) nw=parseInt(nwm[1].replace(/,/g,""))||0;
    // upsert by cleaned name (prevents duplicates from markers/spacing/loc suffix)
    name=cleanProvName(name);
    let p=kd.provinces.find(x=>cleanProvName(x.name).toLowerCase()===name.toLowerCase());
    if(!p){ if(updateOnly) continue; p={id:uid(),name:name,race:"",pers:"",land:0,nw:0,honor:0,defense:0,offense:0,tpa:"",wpa:"",mdtpa:"",mdwpa:"",armyOut:false,returnTick:0,incomingLand:0,generalsUsed:0,pop:0,maxpop:0}; kd.provinces.push(p); added++; }
    if(race) p.race=race;
    if(land) p.land=land;
    if(nw) p.nw=nw;
    seen.push(name.toLowerCase());
  }
  if(added) kd._rev=Date.now();
  return added;
}

/* Collapse any enemy KDs that share the same location into a single record.
   Keeps the newest name, merges all provinces (dedup by name), preserves wave/targets. */
function dedupEnemiesByLoc(){
  if(!STATE||!STATE.enemies) return false;
  const byLoc={}; const removed=[];
  const ids=Object.keys(STATE.enemies);
  for(const id of ids){
    const e=STATE.enemies[id]; const loc=(e.loc||"").trim();
    if(!loc){ continue; }
    if(!byLoc[loc]){ byLoc[loc]=id; continue; }
    // merge e into the keeper
    const keep=STATE.enemies[byLoc[loc]];
    // newest name wins
    if((e._rev||0) > (keep._rev||0) && e.name && !/^KD |^Unnamed/i.test(e.name)) keep.name=e.name;
    else if((!keep.name || /^KD |^Unnamed/i.test(keep.name)) && e.name) keep.name=e.name;
    // merge provinces by name
    keep.provinces=keep.provinces||[];
    (e.provinces||[]).forEach(p=>{
      const ex=keep.provinces.find(q=>(q.name||"").toLowerCase()===(p.name||"").toLowerCase());
      if(ex){ Object.keys(p).forEach(k=>{ if(p[k]!=null && p[k]!=="" && p[k]!==0) ex[k]=p[k]; }); }
      else keep.provinces.push(p);
    });
    // merge wave/targets if keeper empty
    if((!keep.wave||!keep.wave.length) && e.wave&&e.wave.length) keep.wave=e.wave;
    if((!keep.targets||!keep.targets.length) && e.targets&&e.targets.length) keep.targets=e.targets;
    keep._rev=Date.now();
    removed.push(id);
  }
  removed.forEach(id=>{ delete STATE.enemies[id]; if(STATE.activeEnemy===id) STATE.activeEnemy=null; });
  if(removed.length && !STATE.activeEnemy) STATE.activeEnemy=Object.keys(STATE.enemies)[0]||null;
  return removed.length>0;
}
async function syncPull(){
  const url=(STATE.settings.syncUrl||"").trim(); if(!url){ syncOn=false; return; }
  const base=url.replace(/\/+$/,"");
  const k=STATE.settings.syncKey?("&key="+encodeURIComponent(STATE.settings.syncKey)):"";
  // 1) pull the game intel feed (new scouts/news from the game)
  try{
    const res=await fetch(base+"/feed?since="+syncCursor+k);
    const j=await res.json();
    syncOn=true;
    if(j && j.entries && j.entries.length){
      let applied=0;
      j.entries.forEach(en=>{ if(routeFeedEntry(en)) applied++; });
      syncCursor=j.cursor||syncCursor;
      if(applied){ dedupEnemiesByLoc(); save(); render(); }
    }
  }catch(e){ syncOn=false; }
  // 2) pull shared state (other admins' edits) and merge by revision — no duplicates
  try{
    const rs=await fetch(base+"/state?key="+encodeURIComponent(STATE.settings.syncKey||"")+"&_="+Date.now());
    if(rs.ok){
      const remote=await rs.json();
      if(remote && (remote.myKd||remote.enemies)){
        let changed=false;
        // myKd: newer revision wins
        if(remote.myKd && (remote.myKd._rev||0) > (STATE.myKd._rev||0)){ STATE.myKd=remote.myKd; changed=true; }
        // enemies: merge each by id+revision; dedupe by location
        STATE.enemies=STATE.enemies||{};
        const byLoc={};
        Object.values(STATE.enemies).forEach(e=>{ if(e.loc) byLoc[e.loc]=e.id; });
        for(const id in (remote.enemies||{})){
          const re=remote.enemies[id], ce=STATE.enemies[id];
          // if a different local KD already holds this location, keep the newer, drop the other
          if(re.loc && byLoc[re.loc] && byLoc[re.loc]!==id){
            const other=STATE.enemies[byLoc[re.loc]];
            if((re._rev||0) >= (other._rev||0)){ delete STATE.enemies[byLoc[re.loc]]; STATE.enemies[id]=re; byLoc[re.loc]=id; changed=true; }
            continue;
          }
          if(!ce || (re._rev||0) > (ce._rev||0)){ STATE.enemies[id]=re; if(re.loc) byLoc[re.loc]=id; changed=true; }
        }
        if(remote.activeEnemy && STATE.enemies[remote.activeEnemy] && !STATE.activeEnemy){ STATE.activeEnemy=remote.activeEnemy; }
        if(dedupEnemiesByLoc()) changed=true;
        if(changed){ save(); render(); }
      }
    }
  }catch(e){}
}

function grabNum(txt,res){ // first matching number for any regex in list
  for(const r of res){ const m=txt.match(r); if(m) return num(m[1]); } return null;
}
function parseIntelText(txt){
  const t=txt.replace(/\u00a0/g," ");
  const out={kind:null, name:null, fields:{}};
  // province name: "Throne ... of NAME (x:y)" or "Spy on Throne of NAME" or first "NAME (x:y)"
  let m=t.match(/(?:of|on)\s+([A-Za-z'’\- ]{2,40})\s*\(\d{1,2}:\d{1,2}\)/) || t.match(/([A-Za-z'’\- ]{2,40})\s*\(\d{1,2}:\d{1,2}\)/);
  if(m){ out.name=m[1].trim()
    .replace(/^(?:throne|military|sciences?|survey|infiltrate|intel(?:ligence)?|spy)\s+/i,"")
    .replace(/^(?:intelligence|report)?\s*(?:of|on)\s+/i,"").trim(); }
  const low=t.toLowerCase();
  if(/ruler name|personality.*race|race.*personality|throne/i.test(t) && /networth/i.test(t)) out.kind="sot";
  else if(/spy on military|military intel|standing army|troops at home|practical offense|defense at home|army is out|returning in/i.test(low)) out.kind="som";
  else if(/spy on sciences|science intelligence|books|scientists/i.test(low)) out.kind="sos";
  else if(/survey|buildings? breakdown|barren land/i.test(low) && /homes|farms|guilds/i.test(low)) out.kind="survey";
  else if(/infiltrate|thieves(' )?guilds?|thievery intelligence/i.test(low)) out.kind="infil";
  else if(/networth|throne/i.test(low)) out.kind="sot";
  const f=out.fields;
  if(out.kind==="sot"){
    const race=t.match(/Race[:\s]+([A-Za-z ]+?)(?:\n|\||Personality|$)/i); if(race) f.race=race[1].trim();
    const pers=t.match(/Personality[:\s]+(?:The\s+)?([A-Za-z ]+?)(?:\n|\||$)/i); if(pers) f.pers=pers[1].trim();
    f.land=grabNum(t,[/Land[:\s]+([\d,]+)\s*Acres/i,/([\d,]+)\s*Acres/i]);
    f.nw=grabNum(t,[/Net\s*worth[:\s]+([\d,]+)\s*gc/i,/Networth[:\s]+([\d,]+)/i]);
    f.honor=grabNum(t,[/Honor[:\s]+([\d,]+)/i]);
    f.pop=grabNum(t,[/Total Population[:\s]+([\d,]+)/i,/Population[:\s]+([\d,]+)/i]);
    f.maxpop=grabNum(t,[/Max(?:imum)? Population[:\s]+([\d,]+)/i]);
    const peas=grabNum(t,[/Peasants[:\s]+([\d,]+)/i]); if(peas!=null) f.peasants=peas;
    f.offense=grabNum(t,[/Mod(?:ified)? Offense[:\s]+([\d,]+)/i,/Offense[:\s]+([\d,]+)/i]);
    f.defense=grabNum(t,[/Mod(?:ified)? Defense[:\s]+([\d,]+)/i,/Defense[:\s]+([\d,]+)/i]);
    f.tpa=grabNum(t,[/Thieves per Acre[:\s]+([\d.]+)/i,/TPA[:\s]+([\d.]+)/i]);
    f.wpa=grabNum(t,[/Wizards? per Acre[:\s]+([\d.]+)/i,/WPA[:\s]+([\d.]+)/i]);
  } else if(out.kind==="som"){
    f.offense=grabNum(t,[/Mod(?:ified)? Offense[:\s]+([\d,]+)/i,/Practical Offense[:\s]+([\d,]+)/i,/Offense[:\s]+([\d,]+)/i]);
    f.defense=grabNum(t,[/(?:Modified|Practical)? ?Defense at home[:\s]+([\d,]+)/i,/Mod(?:ified)? Defense[:\s]+([\d,]+)/i,/Practical Defense[:\s]+([\d,]+)/i,/Defense[:\s]+([\d,]+)/i]);
    // army out & return
    if(/army (?:is )?(?:out|away)|troops? (?:are )?(?:out|away)|returning/i.test(t)) f.armyOut=true;
    const rt=grabNum(t,[/return(?:s|ing)? in[:\s]+([\d.]+)/i,/([\d.]+)\s*(?:ticks?|hours?)\s+(?:until|till|to)\s+return/i]);
    if(rt!=null){ f.armyOut=true; f.returnTicks=rt; }
    const gu=grabNum(t,[/([\d]+)\s*Generals? (?:out|away|sent)/i,/Generals?[:\s]+([\d]+)\s*\/\s*\d/i]); if(gu!=null) f.generalsUsed=gu;
  } else if(out.kind==="infil"){
    f.tpa=grabNum(t,[/Thieves per Acre[:\s]+([\d.]+)/i,/TPA[:\s]+([\d.]+)/i]);
    const th=grabNum(t,[/([\d,]+)\s*thieves/i]); if(th!=null) f.thieves=th;
  } else if(out.kind==="sos"){
    f.books=grabNum(t,[/Total (?:Books|Science)[:\s]+([\d,]+)/i,/([\d,]+)\s*books/i]);
  } else if(out.kind==="survey"){
    f.land=grabNum(t,[/Total Land[:\s]+([\d,]+)/i,/([\d,]+)\s*Acres/i]);
  }
  return out;
}
function applyIntel(){
  const e=curEnemy(); if(!e){ toast("Pick an enemy KD first."); return; }
  const txt=gv("intelText"); if(!txt.trim()){ toast("Paste the intel page text first."); return; }
  if(/Total Provinces\s+\d+|Net\s*Worth Rank|Land Rank|Honor Rank/i.test(txt)){
    toast("That's a kingdom summary page, not a province scout. Paste a single province's SoT/SoM/etc instead.");
    return;
  }
  const r=parseIntelText(txt);
  if(!r.kind){ toast("Couldn't recognize that as SoT / SoM / SoS / Survey / Infiltrate."); return; }
  if(!r.name){ toast("Found a "+r.kind.toUpperCase()+" but no province name (need 'Name (x:y)')."); return; }
  let p=e.provinces.find(x=>x.name.toLowerCase()===r.name.toLowerCase());
  let created=false;
  if(!p){ p={id:uid(),name:r.name,race:"",pers:"",land:0,nw:0,honor:0,defense:0,offense:0,tpa:"",wpa:"",mdtpa:"",mdwpa:"",armyOut:false,returnTick:0,incomingLand:0,generalsUsed:0,pop:0,maxpop:0}; created=true; }
  const f=r.fields, applied=[];
  const setIf=(key,val,label)=>{ if(val!=null && val!=="" && !(typeof val==="number"&&isNaN(val))){ p[key]=val; applied.push(label||key); } };
  setIf("race",f.race); setIf("pers",f.pers); setIf("land",f.land); setIf("nw",f.nw,"networth");
  setIf("honor",f.honor); setIf("pop",f.pop); setIf("maxpop",f.maxpop);
  setIf("offense",f.offense); setIf("defense",f.defense);
  if(f.tpa!=null){ p.mdtpa=f.tpa; if(!num(p.tpa)) p.tpa=f.tpa; applied.push("tpa"); }   // intel TPA is modified
  if(f.wpa!=null){ p.mdwpa=f.wpa; if(!num(p.wpa)) p.wpa=f.wpa; applied.push("wpa"); }
  if(f.armyOut!=null){ p.armyOut=f.armyOut; applied.push("army out"); }
  if(f.returnTicks!=null){ p.returnTick=STATE.tick+Math.ceil(f.returnTicks); applied.push("return tick"); }
  if(f.generalsUsed!=null){ p.generalsUsed=f.generalsUsed; applied.push("generals used"); }
  if(created) mutate(()=>{ e.provinces.push(p); }); else mutate(()=>{});
  save();
  closeModal();
  toast((created?"Added ":"Updated ")+p.name+" from "+r.kind.toUpperCase()+(applied.length?" — "+applied.join(", "):""));
}

function parseNewsText(txt){
  const e=curEnemy(); if(!e) return 0;
  const lines=txt.split(/\n+/);
  const acresRe=/([\d,]+)\s*acres/i;
  let hits=0;
  e.provinces.forEach(p=>{
    const nm=(p.name||"").toLowerCase(); if(!nm) return;
    lines.forEach(L=>{
      const low=L.toLowerCase();
      if(!low.includes(nm)) return;
      const aggressor = low.indexOf(nm) < low.search(/invad|captur|attack|conquer|raz|ambush|plunder/);
      if(/(captured|invaded|conquered)/.test(low) && aggressor){
        p.armyOut=true; const m=L.match(acresRe); if(m) p.incomingLand=num(p.incomingLand)+num(m[1]);
        p.newsNote=L.trim().slice(0,140); hits++;
      } else if(/returns?/.test(low) && low.includes(nm)){
        p.armyOut=false; hits++;
      }
    });
  });
  return hits;
}

/*══════════════ LIVE CLOCK / COUNTDOWNS ══════════════*/
function eowcfText(exit){
  const diff=new Date(exit)-Date.now();
  if(diff<=0) return "expired";
  const ticks=Math.ceil(diff/3.6e6);
  return `exits in ${ticks} tick${ticks===1?"":"s"}`;
}
let lastHourKey=null;
/* convert ISO string -> value for <input type=datetime-local> in local time */
function toLocalDT(iso){ if(!iso) return ""; const d=new Date(iso); if(isNaN(d)) return ""; const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes()); }
/* Utopian calendar: 1 hr = 1 Utopian day; 24 days = 1 month; 7 months (Jan-Jul) = 1 year.
   Months change at 18:00 GMT+0. Age starts Jan 1, YR0 at the configured ageStart timestamp. */
const UTOPIAN_MONTHS=["January","February","March","April","May","June","July"];
function utopianDate(now){
  now = now || new Date();
  // age start: ISO string in settings, default mid-2026 placeholder until user sets it
  const startStr=(STATE&&STATE.settings&&STATE.settings.ageStart)||"2026-04-28T18:00:00Z";
  const start=new Date(startStr);
  // each Utopian day = 1 hour, ticking at XX:00. Month boundary aligns to 18:00 GMT.
  let hoursElapsed=Math.floor((now-start)/3.6e6);
  if(hoursElapsed<0) hoursElapsed=0;
  // day-of-age counting from 0 -> compute year/month/day
  const dayOfAge=hoursElapsed;                 // 0-based Utopian days since age start
  const year=Math.floor(dayOfAge/(7*24));      // 7 months * 24 days
  const dayInYear=dayOfAge%(7*24);
  const month=Math.floor(dayInYear/24);        // 0..6
  const day=(dayInYear%24)+1;                  // 1..24
  return { year, month, day, label: UTOPIAN_MONTHS[month]+" "+day+", YR"+year };
}
function tickClock(){
  const c=document.getElementById("realClock");
  const now=new Date();
  if(c) c.textContent=now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const rd=document.getElementById("realDate");
  if(rd) rd.textContent=now.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'});
  const ud=document.getElementById("utopiaDate");
  if(ud){ const u=utopianDate(now); ud.textContent="🏰 "+u.label; }
  // EoWCF countdowns update once per tick (hour), in place — never re-render the view
  const hk=Math.floor(Date.now()/3.6e6);
  if(hk!==lastHourKey){
    lastHourKey=hk;
    document.querySelectorAll('.cd[data-exit]').forEach(el=>{
      const diff=new Date(el.dataset.exit)-Date.now();
      el.textContent=eowcfText(el.dataset.exit);
      el.classList.toggle("soon", diff>0 && diff<6*3.6e6);
      el.classList.toggle("exp", diff<=0);
    });
  }
}
